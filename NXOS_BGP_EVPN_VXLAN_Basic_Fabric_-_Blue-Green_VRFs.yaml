lab:
  description: Basic 2-spine/2-leaf BGP EVPN VXLAN fabric. OSPF underlay (172.16.0.0/16),
    iBGP EVPN overlay with spines as route reflectors (AS 65000), ingress-replication
    (no multicast), anycast gateways for VRF Blue/Green (192.168.0.0/16 client subnets).
    Leaf1/Leaf2 vPC peer-link + dual-homed access switch. Spine1 is border node connecting
    an IOSv router providing DHCP+DNS for both VRFs.
  notes: |-
    ## BGP EVPN VXLAN Fabric — Blue/Green VRF Lab Guide

    A walkthrough of every node in this lab, what each major piece of configuration actually does, and step-by-step instructions for reproducing the demo scenarios that were run against it.

    ---

    ### 1. Topology at a glance

    | Node | Platform | Role | Loopback / Mgmt IP | Credentials |
    |---|---|---|---|---|
    | Spine1-Border | Nexus 9000v (NX-OS 10.6(2)) | Spine + Route Reflector + Border/VRF gateway | Lo0: 172.16.255.1/32 | admin / CiscoLab! |
    | Spine2 | Nexus 9000v (NX-OS 10.6(2)) | Spine + Route Reflector | Lo0: 172.16.255.2/32 | admin / CiscoLab! |
    | Leaf1 | Nexus 9000v (NX-OS 10.6(2)) | VTEP leaf | Lo9: 172.16.255.11/32 | admin / CiscoLab! |
    | Leaf2 | Nexus 9000v (NX-OS 10.6(2)) | VTEP leaf | Lo9: 172.16.255.12/32 | admin / CiscoLab! |
    | AccessSwitch | IOSvL2 | Plain L2 access switch behind Leaf1 | — | (no login required) |
    | BorderRouter-DNS-DHCP | IOSv | DHCP + DNS server for both VRFs, VRF transit router | — | admin / cisco123 |
    | Client1-Blue, Client2-Blue-Moved, Client3-Blue | Alpine Linux | Blue VRF end hosts | — | cisco / cisco |
    | Client1-Green, Client2-Green, Client3-Green | Alpine Linux | Green VRF end hosts | — | cisco / cisco |

    **Physical layout:** Spine1-Border and Spine2 each connect to both Leaf1 and Leaf2 (classic Clos). Spine1-Border also trunks off to BorderRouter-DNS-DHCP. Leaf1 connects directly to two clients plus AccessSwitch (which itself hosts two more clients). Leaf2 connects directly to two clients. There is no vPC anywhere in this build — see §4.7 for why.

    ---

    ### 2. Addressing plan

    | Segment | VLAN | L2 VNI | Subnet | Anycast GW | Notes |
    |---|---|---|---|---|---|
    | BLUE clients | 10 | 10010 | 192.168.10.0/24 | .1 | Blue VRF |
    | GREEN clients | 20 | 10020 | 192.168.20.0/24 | .1 | Green VRF |
    | BLUE transit (to border router) | 110 | — | 192.168.110.0/30 | — | Spine1-Border ↔ BorderRouter |
    | GREEN transit (to border router) | 120 | — | 192.168.120.0/30 | — | Spine1-Border ↔ BorderRouter |
    | VRF BLUE L3VNI | 3001 | 50001 | — | — | routed/VXLAN plumbing only |
    | VRF GREEN L3VNI | 3002 | 50002 | — | — | routed/VXLAN plumbing only |
    | Underlay point-to-points | — | — | 172.16.1.0/31 blocks | — | one /31 per spine-leaf link |
    | Underlay loopbacks | — | — | 172.16.255.0/24 | — | BGP/OSPF router-IDs, VTEP source |

    Current client IPs (all via DHCP except where noted):

    | Client | Attached to | VRF | IP |
    |---|---|---|---|
    | Client1-Blue | Leaf1 Eth1/6 | BLUE | 192.168.10.11 |
    | Client2-Blue-Moved | Leaf1 Eth1/4 | BLUE | 192.168.10.13 (static — see §5.2) |
    | Client3-Blue | AccessSwitch Gi0/2 | BLUE | 192.168.10.14 |
    | Client1-Green | Leaf1 Eth1/3 | GREEN | 192.168.20.12 |
    | Client2-Green | Leaf2 Eth1/3 | GREEN | 192.168.20.13 (designated shared-services host — see §5.3) |
    | Client3-Green | AccessSwitch Gi0/3 | GREEN | 192.168.20.14 |

    ---

    ### 3. Node-by-node breakdown

    **Spine1-Border** — an ordinary BGP EVPN route-reflector spine that *also* terminates the VRFs. It carries no client-facing VLANs; its `nve1` only has `member vni ... associate-vrf` statements (L3VNI only, no L2VNI), because its only job is routing between the fabric and the outside world. It holds a static default route per VRF pointing at the border router, and redistributes it into EVPN.

    **Spine2** — a "pure" spine. OSPF underlay + BGP EVPN route-reflector-client relationship to both leafs, nothing else. No VXLAN, no VRFs. Included specifically to prove ECMP/redundancy works with more than one spine.

    **Leaf1 / Leaf2** — the actual VTEPs. Each owns VLAN 10 and VLAN 20 locally (anycast gateway on both), relays DHCP to the border router, and peers BGP EVPN to *both* spines (never to each other directly — that's the point of the route reflector). Both use `loopback9` as their VTEP source interface (a historical artifact — see §4.7).

    **AccessSwitch** — a plain L2 switch with no routing and no BGP/VXLAN awareness at all. It exists purely to prove that a VXLAN EVPN fabric looks like an ordinary switch to anything plugged into it — from AccessSwitch's point of view, Leaf1 is just an upstream trunk.

    **BorderRouter-DNS-DHCP** — the one "traditional" router in the topology. It has two sub-interfaces, one per VRF transit VLAN, and provides DHCP and DNS to both Blue and Green from a single box. It is *not* itself VRF-aware — its two sub-interfaces sit in one shared IOS routing table, which is exactly what created the accidental full VRF leak discovered in §5.3.

    **Clients** — minimal Alpine Linux VMs. They don't auto-configure networking; DHCP is triggered manually with `sudo udhcpc -i eth0` (see any scenario below for examples).

    ---

    ### 4. What the major configuration blocks are doing

    #### 4.1 OSPF underlay
    Every point-to-point spine-leaf link and every loopback carries:
    ```
    ip router ospf UNDERLAY area 0.0.0.0
    ```
    directly on the interface — there are no `network` statements anywhere. This is the modern, less error-prone way to run OSPF: whatever interface has the command is in the process, full stop. The underlay's only job is to make every loopback reachable from every other loopback; it has no idea VXLAN or VRFs exist.

    #### 4.2 BGP EVPN overlay with route reflectors
    Single AS (65000), iBGP only. Spine1-Border and Spine2 are configured as route-reflector-clients for both leafs under `address-family l2vpn evpn`:
    ```
    neighbor 172.16.255.11
      remote-as 65000
      update-source loopback0
      address-family l2vpn evpn
        route-reflector-client
    ```
    Leafs peer to *both* spines (never to each other) using their own loopback as the update-source. This is why removing vPC didn't cost any redundancy — BGP already has two independent paths to reflect routes through.

    #### 4.3 VNI / VRF / route-target scheme
    Two VNI types are in play:
    - **L2 VNIs** (10010, 10020) carry Ethernet frames for VLAN 10/20 across the fabric — this is what makes two hosts on the same VLAN, on different leafs, look like they're on the same wire.
    - **L3 VNIs** (50001 for BLUE, 50002 for GREEN) carry *routed* traffic between VRFs and the border. They're represented locally by VLAN 3001/3002 SVIs that have `ip forward` but no IP address — pure VXLAN-routing plumbing, nothing terminates there.

    Every VRF and VNI uses `rd auto` / `route-target both auto` — NX-OS derives the route-distinguisher and route-target automatically from the local ASN and VNI, so every node with `vrf context BLUE` configured automatically imports and exports the same targets without anyone typing a real RT number anywhere.

    #### 4.4 The NVE interface (VTEP)
    ```
    interface nve1
      source-interface loopback9
      host-reachability protocol bgp
      member vni 10010
        ingress-replication protocol bgp
      member vni 50001 associate-vrf
    ```
    - `source-interface` is the VTEP's own identity — the IP every other VTEP will encapsulate traffic to when sending it here.
    - `host-reachability protocol bgp` means MAC/IP learning happens via the BGP EVPN control plane, not flood-and-learn — a leaf never floods to find a remote host, it just looks it up in a table BGP already populated.
    - `ingress-replication protocol bgp` is what replaces multicast for BUM (broadcast/unknown-unicast/multicast) traffic: each VTEP keeps a unicast replication list built from BGP Type-3 routes, and sends one copy per remote VTEP instead of relying on a multicast underlay. This was a hard requirement from day one — no multicast anywhere in this build.
    - `associate-vrf` (no VLAN) is the L3VNI variant — it ties the VNI straight to a VRF for routed inter-subnet/inter-site traffic instead of a single VLAN.

    #### 4.5 Anycast gateway — the important one
    Two commands make this work:
    ```
    fabric forwarding anycast-gateway-mac 2020.0000.00aa      ! global, identical on every leaf
    !
    interface Vlan10
      ip address 192.168.10.1/24
      fabric forwarding mode anycast-gateway
    ```
    **What it does:** every leaf that owns VLAN 10 answers ARP for 192.168.10.1 using the *exact same* virtual MAC, and every leaf has that *exact same* IP configured on its own local Vlan10 SVI. There is no "primary" or "standby" gateway — every leaf is simultaneously the gateway for whatever hosts happen to be plugged into it.

    **How it works / why it's different from HSRP:** HSRP/VRRP elect one active router per subnet and everyone else is standby — traffic to the gateway has to physically reach the active box, even if a closer router exists. Anycast gateway skips the election entirely: routing for a host always happens at the *first leaf it touches*, then the fabric (VXLAN, over the L3VNI) carries the already-routed packet to wherever it needs to go. This is only safe because BGP EVPN's control-plane MAC/IP synchronization keeps every leaf's ARP/routing tables consistent — there's no risk of two leafs answering ARP differently for the same host, because the host itself is only ever attached to one leaf at a time (see §5.2 for what happens when that changes).

    This is also *why* the host-mobility demo in §5.2 works cleanly: moving a host to a different leaf doesn't require any gateway reconfiguration at all — the new leaf already has the identical gateway IP/MAC sitting there waiting.

    #### 4.6 DHCP relay
    ```
    feature dhcp
    !
    interface Vlan10
      ip dhcp relay address 192.168.110.2
    ```
    DHCP DISCOVER is a subnet broadcast, and broadcasts don't get flooded across the VXLAN fabric to a remote DHCP server by themselves. The relay command converts the broadcast into a unicast packet aimed straight at the border router's Blue-side IP, which is why the border router needed one relay target per VRF (192.168.110.2 for Blue, 192.168.120.2 for Green).

    #### 4.7 Route leaking to the border, and a real NX-OS gotcha
    On every leaf:
    ```
    router bgp 65000
      vrf BLUE
        address-family ipv4 unicast
          advertise l2vpn evpn
          redistribute direct route-map PERMIT-ALL
    ```
    This takes the leaf's own connected client subnet and injects it as an EVPN Type-5 (IP-prefix) route so the border and other leafs can route to it.

    On Spine1-Border, the reverse direction (the *default route*, so clients can reach the DHCP/DNS server and beyond) needed one extra command that isn't obvious from the docs:
    ```
    vrf BLUE
      ip route 0.0.0.0/0 192.168.110.2
    router bgp 65000
      vrf BLUE
        address-family ipv4 unicast
          redistribute static route-map PERMIT-ALL
          default-information originate      ← without this, the 0.0.0.0/0 never actually gets advertised
    ```
    `redistribute static` alone does **not** propagate a static default route into BGP, even with a fully permissive route-map — NX-OS specifically requires `default-information originate` to originate 0.0.0.0/0. This was one of the real bugs hit while building this lab (clients had no default route until this was added).

    #### 4.8 Why there's no vPC in this build
    The lab originally used full vPC multihoming between Leaf1 and Leaf2 (peer-link, peer-keepalive, dual-homed AccessSwitch). During testing, Leaf2 repeatedly lost its VTEP loopback ("Administratively down" every 10–40 seconds) with `feature vpc` enabled — confirmed independent of NX-OS image version and independent of primary/secondary vPC role. Removing `feature vpc`/`feature lacp` entirely fixed it permanently. AccessSwitch is now single-homed to Leaf1 only, and two extra standalone clients were added (one per VRF) to keep the "multiple attachment points" idea alive without vPC. Section §5.4 below covers what does and doesn't work as an alternative on this platform.

    ---

    ### 5. Hands-on scenarios

    #### 5.1 Failure / convergence test
    **Goal:** prove the fabric survives a spine-leaf link failure without vPC, using only ECMP in the underlay.

    1. Baseline, on Leaf1:
       ```
       show ip ospf neighbors
       show bgp l2vpn evpn summary
       ```
       You should see two OSPF neighbors (both spines) and two established EVPN sessions.
    2. Fail the link to Spine1:
       ```
       configure terminal
       interface Ethernet1/1
       shutdown
       ```
    3. Re-check convergence:
       ```
       show ip ospf neighbors          ! only Spine2 remains as a direct neighbor
       show ip route 172.16.255.1      ! Spine1's loopback is now reached via Eth1/2, through Leaf2
       show bgp l2vpn evpn summary     ! the session to Spine1 keeps its ORIGINAL uptime — it never flapped
       ```
    4. From any client, confirm the data plane never blinked: `sudo udhcpc -i eth0` still succeeds.
    5. Restore: `interface Ethernet1/1` → `no shutdown`. The direct OSPF neighbor reforms in a few seconds.

    #### 5.2 Host mobility demo
    **Goal:** show BGP EVPN detect a host moving to a different leaf with zero manual MAC-table intervention anywhere in the fabric.

    1. Check where the host currently lives, on both leafs:
       ```
       show l2route evpn mac-ip all
       ```
       The host's MAC/IP shows `HMM / L (Local)` on its home leaf, and `BGP` with a next-hop pointing at that leaf's loopback on every other leaf.
    2. Relocate it. In CML you can't hot-swap an interface's cable, so the clean way is:
       - Wire a (new or existing) client into a free port on the *other* leaf.
       - Configure that port as an access port in the correct VLAN.
       - Give the client the **same IP** the old host had (a fresh MAC is fine and, if anything, makes the demo more realistic — think "replacement NIC, same address").
       - Generate traffic so the new leaf actually learns it: `ping <anycast-gateway-ip>` from the client is enough.
    3. Re-check both leafs:
       ```
       show l2route evpn mac-ip all
       ```
       The old leaf's local entry for that IP is completely gone; the new leaf now shows it as `Local`; every other leaf's remote pointer flips to the new leaf's loopback automatically. You can also see the underlying route directly:
       ```
       show bgp l2vpn evpn | include <the IP>
       ```

    #### 5.3 Shared-services VRF leak
    **Goal:** deliberately allow exactly one host to be reachable across the Blue/Green boundary, while keeping everything else isolated.

    1. **Check your assumptions first.** Before changing anything, try pinging across VRFs from a client and traceroute it:
       ```
       ping <a Green IP> from a Blue client
       traceroute <a Green IP> from a Blue client
       ```
       In this lab that ping unexpectedly *succeeded* — traceroute showed the path going through the border router's own Blue and Green transit addresses. The border router isn't VRF-aware; it has both client subnets in one routing table, so it was silently routing between Blue and Green the whole time. Worth checking on any lab before assuming VRFs are actually isolated.
    2. On the border router, build two directional ACLs — permit the one designated shared host explicitly, block the general subnet-to-subnet path, then allow everything else through untouched (DNS/DHCP replies, etc.):
       ```
       ip access-list extended BLUE-TO-GREEN-FILTER
        permit ip 192.168.10.0 0.0.0.255 host 192.168.20.13
        deny   ip 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255
        permit ip any any
       !
       ip access-list extended GREEN-TO-BLUE-FILTER
        permit ip host 192.168.20.13 192.168.10.0 0.0.0.255
        deny   ip 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255
        permit ip any any
       ```
    3. Apply each ACL inbound on its matching VRF sub-interface:
       ```
       interface GigabitEthernet0/1.110
        ip access-group BLUE-TO-GREEN-FILTER in
       interface GigabitEthernet0/1.120
        ip access-group GREEN-TO-BLUE-FILTER in
       ```
    4. Verify all four cases:
       ```
       Blue client  → 192.168.20.13 (shared host)   → succeeds
       Blue client  → any other Green host          → fails
       192.168.20.13 → Blue client                  → succeeds
       any other Green host → Blue client           → fails
       ```

    #### 5.4 Testing whether an advanced feature is actually usable on this platform
    **Goal:** a repeatable method for verifying platform support instead of trusting the datasheet — used here to check both EVPN ESI Multihoming and EVPN Multi-Site/Border-Gateway.

    1. Identify exactly what you're running:
       ```
       show version | include NXOS
       show inventory | include PID
       ```
       (This lab reports NX-OS 10.6(2) on PID `N9K-C9300v` — a generic virtual chassis, not tied to a specific real ASIC.)
    2. Cross-reference Cisco's platform-support table for the feature in the matching release's config guide.
    3. Try the actual configuration commands live, starting with the most fundamental one first:
       - **ESI Multihoming** (a vPC-less alternative multihoming method):
         ```
         hardware access-list tcam region ing-flow-redirect 512
         evpn multihoming
         ```
         Both rejected as `% Invalid command` on this platform — the feature is not available here at all, regardless of NX-OS version eligibility on paper.
       - **EVPN Multi-Site / Border Gateway**:
         ```
         evpn multisite border-gateway 100
         interface loopback100
          ip address <unused loopback>/32
         interface nve1
          multisite border-gateway interface loopback100
         ```
         Both accepted and confirmed in `show running-config nv overlay` — but the interface-level commands needed for a real deployment:
         ```
         interface EthernetX/Y
          evpn multisite dci-tracking
          evpn multisite fabric-tracking
         ```
         were both rejected as invalid. Verdict: **partial support** — the core BGW control-plane config works, but the platform can't actually track DCI/fabric links, so a real Multi-Site deployment isn't achievable here.
    4. Whichever way it goes, remove the test configuration immediately afterward (reverse order) so the lab's real state doesn't carry half-applied features:
       ```
       interface nve1
        no multisite border-gateway interface loopback100
       no interface loopback100
       no evpn multisite border-gateway 100
       ```

    ---

    ### 6. Quick reference — useful verification commands

    | Command | What it tells you |
    |---|---|
    | `show ip ospf neighbors` | Underlay adjacency state |
    | `show bgp l2vpn evpn summary` | EVPN session state + prefix counts per neighbor |
    | `show nve peers` | VTEP-to-VTEP reachability and uptime |
    | `show l2route evpn mac-ip all` | Where every host's MAC/IP currently lives (local vs. remote) |
    | `show bgp l2vpn evpn` | Raw EVPN route types (Type-2 MAC/IP, Type-3 IMET, Type-5 prefix, etc.) |
    | `show ip route vrf <BLUE\|GREEN>` | What each VRF's routing table actually looks like |
    | `show interface status` (or `show interfaces status` on IOS switches) | Physical/access-port link state |
