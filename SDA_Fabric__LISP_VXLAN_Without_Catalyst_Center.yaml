lab:
  description: ''
  notes: |-
    SDA Fabric: LISP+VXLAN Without Catalyst Center

    Hand-built SD-Access fabric mechanics on real Catalyst 9000v switches (cat9000v-uadp) -- no Catalyst Center automation. IS-IS underlay, LISP control plane (CP1 = MS/MR), VXLAN data plane, border PxTR/PETR (BN1), two anycast-gateway edge nodes (EN1/EN2). cat8000v used only for EXT-RTR, representing the non-fabric outside network. cat9800 (WLC1) added as a config-only wireless-fabric reference node, physically cabled to BN1 Gi1/0/6 (shared-services position) with the port intentionally shut down on both ends.

    Part A (CAMPUS VN, instance-id 4097, 172.30.0.0/16): fully verified live. IS-IS adjacencies up, LISP site registration confirmed on CP1, intra-fabric VXLAN dataplane (H1<->H2 across EN1/EN2) 100% success, bidirectional fabric<->outside connectivity 100% success via BN1's PITR/PETR + LISP publication-based route-export model.

    Part B: GUEST VN (instance-id 4099, VRF GUEST, 172.31.0.0/16) -- full control-plane + border-dataplane verified live; edge-hosted client dataplane test blocked by a CML platform limitation (see below). IPv6 dual-stack added to CAMPUS VN on existing H1/H2 links -- interface/ND layer fully verified live; LISP IPv6 dynamic-EID registration did not activate (device-tracking/SISF gap), documented as a live finding.

    Wireless (WLC1, cat9800): cabled to BN1 Gi1/0/6 (10.200.0.12/30, BN1=.13/WLC1=.14) -- port shutdown on both ends, intentionally, for reference-only review (not for live traffic -- would hit the new-port limitation below regardless, and WLC1's own console is unresponsive post-boot in this environment). Config includes real Catalyst 9800 SD-Access fabric CLI sourced directly from Cisco's official 17.14.x config guide (wireless fabric control-plane / wireless profile fabric / wireless tag site / wireless fabric name), mapped onto the lab's real CAMPUS VN (l3-vnid 4097, 172.30.0.0/16). An addressing bug from the first pass (WLC1 uplink using .11, the broadcast address of a /30 block) was caught and fixed to .14 in a clean /30.

    Key config gotchas discovered and fixed live: ip routing not on by default on cat9000v-uadp; ip router isis silently dropped if pushed before the isis process is defined in the same config push; itr and proxy-itr are mutually exclusive (proxy-itr is border-only); use-petr goes inside service ipv4, not at the top router lisp level; PITR route injection requires the map-cache publications / import publication publisher / route-export publications trio, not route-export site-registrations; anycast gateway (identical SVI IP on every edge) is required for LISP host mobility to work at all.

    Known limitations (documented in the guide, not hidden): (1) any link added to a cat9000v-uadp switch after the lab's initial topology build fails to pass traffic (0 packets in/out) regardless of link flap or node/switch reboot, reproduced independently 5x across three switch nodes including a stop-link-boot ordering test -- blocked the host-mobility demo and the GUEST-VN edge-client test (WLC1's link is deliberately left shut down rather than tested against this); (2) LISP IPv6 dynamic-EID registration gap; (3) WLC1 console unresponsive post-boot. Core Part A and the GUEST/IPv6 control planes are otherwise fully verified.

    Deliverables: sda_lab_guide.md / sda_lab_guide.txt (18 sections: topology, addressing, IS-IS, LISP CP/edge/border configs, VXLAN, host mobility, GUEST VN, IPv6 dual-stack, wireless fabric reference, known limitations, 11 exercises, reference tables).
  title: 'SDA Fabric: LISP+VXLAN Without Catalyst Center'
  node_staging:
    enabled: false
    start_remaining: true
    abort_on_failure: false
  version: 0.3.1
