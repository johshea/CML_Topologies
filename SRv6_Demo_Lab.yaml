    1.3 Physical topology (as wired in CML)
            ┌─────────────────┐

            │  ext-bridge90   │  (External Connector, BRIDGE mode = "bridge90")

            │  (your LAN)     │

            └────────┬────────┘

                     │ PE1 Gi0/0/0/3  (ipv4 dhcp — management uplink)

                     │

     [Client1]──Gi0/0/0/2──┤        Gi0/0/0/0          Gi0/0/0/0        ├──Gi0/0/0/2──[Client2]

                      ┌────┴────┐ ─────────────── ┌────────┐ ─────────── ┌────┴────┐

                      │   PE1   │                 │   P1   │             │   PE2   │

                      └────┬────┘                 └────────┘             └────┬────┘

                           │ Gi0/0/0/1                                  Gi0/0/0/1 │

                           └──────────── direct "shortcut" link ──────────────────┘

                                      (PE1 Gi0/0/0/1 ↔ PE2 Gi0/0/0/1)

    There are two paths PE1→PE2: the direct link (1 hop, OSPF shortest path) and the path through P1 (2 hops). The direct link wins by default; the longer path exists so you can later force traffic onto it with SR-TE (see §7.3).

    XRv9000 interface quirk (important): on this platform the first three NIC slots are MgmtEth0/RP0/CPU0/0, donotuse1, donotuse2. The first usable data interface is GigabitEthernet0/0/0/0. In CML that means data interfaces are added starting at the 4th slot — already handled in this lab, but remember it if you add more links.
