        content: |-
          hostname PE1
          !
          username cisco
           group root-lr
           group cisco-support
           secret cisco
          !
          ssh server v2
          ssh server vrf default
          !
          interface Loopback0
           ipv6 address 2001:db8:0:1::1/128
          !
          interface GigabitEthernet0/0/0/0
           description To-P1
           no shutdown
           ipv6 address 2001:db8:1:1::0/127
           ipv6 enable
          !
          interface GigabitEthernet0/0/0/1
           description To-PE2-direct-shortcut
           no shutdown
           ipv6 address 2001:db8:1:3::0/127
           ipv6 enable
          !
          interface GigabitEthernet0/0/0/2
           description To-Client1
           no shutdown
           ipv6 address 2001:db8:2:1::1/64
           ipv6 enable
          !
          interface GigabitEthernet0/0/0/3
           description To-External-bridge90-mgmt
           no shutdown
           ipv4 address dhcp
          !
          segment-routing
           srv6
            encapsulation
             source-address 2001:db8:0:1::1
            !
            locators
             locator MAIN
              prefix fc00:0:1::/48
             !
            !
           !
          !
          router ospfv3 CORE
           router-id 1.1.1.1
           segment-routing srv6 locator MAIN
           area 0
            interface Loopback0
             passive enable
            !
            interface GigabitEthernet0/0/0/0
             network point-to-point
            !
            interface GigabitEthernet0/0/0/1
             network point-to-point
            !
           !
          !
          route-policy PASS-CLIENT
            if destination in (2001:db8:2:0::/32 ge 64) then
              pass
            else
              drop
            endif
          end-policy
          !
          router bgp 65000
           bgp router-id 1.1.1.1
           address-family ipv6 unicast
            redistribute connected route-policy PASS-CLIENT
           !
           neighbor 2001:db8:0:1::3
            remote-as 65000
            update-source Loopback0
            address-family ipv6 unicast
            !
           !
          !
          end
