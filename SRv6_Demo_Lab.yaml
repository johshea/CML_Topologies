lab:
  description: ISIS+SRv6 underlay, single-AS iBGP overlay, PE1/P1/PE2 (IOS XRv9000)
    + Client1/Client2 (Alpine)
  notes: |-
    SRv6 over OSPFv3 — CML Lab Guide
    Underlay IGP: OSPFv3 (single area 0) Forwarding: SRv6 (locator-based End SIDs — no MPLS, no LDP) Overlay: Single-AS iBGP IPv6 unicast (BGP-over-SRv6) Remote access: External Connector in bridge mode (bridge90) off PE1 Platform: Cisco IOS XRv9000 (image iosxrv9000-26-1-1) + Alpine Linux clients Lab ID: a49e7c2f-248a-4d75-ab46-27614a871164 · Title: SRv6 Demo Lab

    This guide documents the lab as actually deployed and running in CML, not a paper design. Everything below was pushed to the live nodes.


    1. The environment
    1.1 What this lab is
    This is a small service-provider core that demonstrates SRv6 (Segment Routing over IPv6) without any MPLS. Three routers form the transport core; two Linux hosts sit at the edges as "customers." The control plane is split into two layers, which is exactly how real SP networks are structured:

    Underlay (transport): OSPFv3 distributes router loopbacks and, crucially, each router's SRv6 locator. Once every router knows every other router's locator, any router can build an IPv6 forwarding path to any other using SRv6 SIDs — no label distribution protocol required, because in SRv6 the "label" is an IPv6 address drawn from the locator.
    Overlay (services): BGP carries the actual customer prefixes between the edge routers (PEs). BGP next-hops resolve over the SRv6 underlay, so customer traffic is encapsulated in an outer IPv6 header with a Segment Routing Header (SRH) and carried across the core.

    The split matters: the core router (P1) has no idea customer prefixes exist. It only forwards SRv6-encapsulated packets based on the locator route it learned via OSPFv3. This is the SRv6 value proposition — state lives at the edge, the core stays simple.
    1.2 Node inventory (live)
