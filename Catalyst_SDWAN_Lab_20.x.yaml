lab:
  description: This lab was deployed using SD-WAN lab automation.
  notes: |2

    -- Do not delete this text -- manager_external_ip = 192.168.90.2:443 -- Do not delete this text --
    *** You may need to change this based on your environment, this IP allows external connectivity to the Manager


    Catalyst SD-WAN Lab Guide
    Lab: sdwan-lab | Platform: Catalyst SD-WAN 20.18.2.1 | Edges: 3 × cat-sdwan-edge-17-18-02


    Credentials
    Node
    Username
    Password
    Manager01 (vManage)
    admin
    admin
    Validator01 (vBond)
    admin
    admin
    Controller01 (vSmart)
    admin
    admin
    Edge01 / Edge02 / Edge03
    admin
    admin


    Manager UI: https://192.168.90.2:443


    Topology
    ┌─────────────────────────────────────────────────────┐

    │                  CONTROL PLANE                      │

    │  Manager01 (vManage)  Validator01 (vBond)           │

    │  Controller01 (vSmart)                              │

    │         │ eth1              │ ge0/0    │ eth1        │

    └─────────┼──────────────────┼──────────┼─────────────┘

              └──────────────────┴──────────┘

                        VPN0 mgmt switch

                              │

                          Gateway (IOL-XE)

                          NAT + underlay hub

                         /              \

                  INET switch        MPLS switch

                (biz-internet)        (mpls)

               /     |      \       /    |     \

            Edge01 Edge02 Edge03  Edge01 Edge02 Edge03

             G1     G1     G1      G2    G2     G2
    Node roles
    Node
    SD-WAN Role
    Notes
    Manager01
    vManage
    Templates, policy, monitoring — all config starts here
    Validator01
    vBond
    ZTP rendezvous; edges call home here first
    Controller01
    vSmart
    OMP route reflector; edges never peer OMP directly with each other
    Gateway
    IOL-XE
    NATs mgmt subnet to Internet connector; bridges INET and MPLS transports
    INET
    IOL-L2-XE
    Simulates internet/broadband transport — color: biz-internet
    MPLS
    IOL-L2-XE
    Simulates private carrier transport — color: mpls
    Edge01-03
    WAN Edge
    Dual-homed: GigabitEthernet1 → INET, GigabitEthernet2 → MPLS

    Edge addressing
    Edge
    Site ID
    System IP
    VPN 1 prefix
    VPN 2 prefix
    Edge01
    101
    10.0.1.1
    10.101.0.0/24
    10.201.0.0/24
    Edge02
    102
    10.0.2.1
    10.102.0.0/24
    10.202.0.0/24
    Edge03
    103
    10.0.3.1
    10.103.0.0/24
    10.203.0.0/24



    Current state
    All three edges completed ZTP and appear in vManage's WAN Edge List as Unassigned — certificates are valid, control connections are up, but no device template has been attached yet. Follow the steps below in order.


    Step 1 — Verify control plane health
    Do this before touching the edges. A bad control plane makes template push stall silently.

    1.1 Certificates

    Configuration → Certificates → Controllers

    Both Validator01 and Controller01 must show Valid (green)
    If either shows Staging or Invalid — stop, fix PKI first

    Configuration → Certificates → WAN Edge List

    All three edges must show Valid

    1.2 Control connections

    Controller01# show sdwan control connections

    Look for vBond (Validator01) in state up. A down or flapping session here is the #1 cause of templates that never come up.

    1.3 Clock sync

    Manager01# show clock

    Validator01# show clock

    Controller01# show clock

    Skew > 5 min causes DTLS handshake failures with no clear error message on the edge.


    Step 2 — Build feature templates
    Configuration → Templates → Feature Templates → Add Template → select Catalyst SD-WAN Edge

    Template
    Key settings
    System
    Site ID (variable), System IP (variable), hostname (variable), org-name must match cert exactly, vBond address
    VPN 0 — Transport
    Enable VPN 0, default gateway if static IPs
    VPN 0 Iface — GigabitEthernet1
    Interface GigabitEthernet1, color biz-internet, encap ipsec
    VPN 0 Iface — GigabitEthernet2
    Interface GigabitEthernet2, color mpls, encap ipsec
    VPN 512 — Management
    OOB management VPN
    VPN 1 — Service
    LAN VPN, per-edge prefix variable, gives OMP a route to advertise
    VPN 2 — Guest/IoT
    Second service VPN for Exercise 3, per-edge prefix variable
    BFD / App-route
    Platform defaults are fine; include so device template is complete
    AAA
    Local auth, same admin credentials


    Interface names are exact — GigabitEthernet1 and GigabitEthernet2. A mismatch causes the push to succeed in vManage but fail with a CLI error on the device.


    Step 3 — Build and attach device template
    3.1 Create device template

    Configuration → Templates → Device Templates → Add Device Template → From Feature Template

    Name: Branch-Edge-Base

    Assemble: System + VPN 0 (with both interface templates) + VPN 512 + VPN 1 + VPN 2 + BFD + AAA

    3.2 Attach to edges

    Select Branch-Edge-Base → Attach Devices → move Edge01, Edge02, Edge03 to Selected → Attach

    Supply per-device variables:

    Edge
    Site ID
    System IP
    Hostname
    Edge01
    101
    10.0.1.1
    edge01
    Edge02
    102
    10.0.2.1
    edge02
    Edge03
    103
    10.0.3.1
    edge03


    Click Preview Device Config per edge before pushing. Then Configure Devices.

    Watch WAN Edge List: Unassigned → Syncing → In Sync

    In Sync = config accepted. It does not mean BFD is up. Verify in Step 4.


    Step 4 — Verify data plane
    Do these checks in order — each depends on the one before.

    4.1 BFD

    Edge01# show sdwan bfd sessions

    Expect 4 sessions from Edge01: to Edge02 via biz-internet, to Edge02 via mpls, to Edge03 via biz-internet, to Edge03 via mpls. All state up.

    Symptom
    Likely cause
    No sessions
    VPN 0 interface template wrong — check interface name and color
    Sessions init/down
    Underlay routing — check Gateway NAT between INET and MPLS
    Sessions flapping
    Clock skew or DTLS instability on Controller


    4.2 OMP

    Controller01# show sdwan omp peers

    Edge01# show sdwan omp routes vpn 1

    Edge01# show sdwan omp tlocs

    Each edge should see remote VPN 1 prefixes with two TLOC entries (biz-internet + mpls).

    4.3 End-to-end ping

    Edge01# ping vpn 1 10.102.0.1 source 10.101.0.1

    Edge01# ping vpn 1 10.103.0.1 source 10.101.0.1

    Both should succeed. Check path taken:

    Edge01# show sdwan app-route stats


    Policy Exercise 1 — App-aware routing (voice/video SLA)
    Scenario: Prefer MPLS for voice traffic; auto-failover to INET if MPLS degrades.

    Why: App-route uses live BFD loss/latency/jitter measurements to make continuous per-class forwarding decisions — not just binary up/down.

    Config:

    Configuration → Policies → Centralized Policy → Add Policy → name: Branch-Traffic-Policy
    Lists → SLA Class → name: Voice-SLA → Loss ≤ 1%, Latency ≤ 100ms, Jitter ≤ 30ms
    Create a Data Prefix List matching your test subnet (e.g. 10.200.0.0/24)
    App-Aware Routing entry: match the prefix list, SLA class = Voice-SLA, Preferred Color = mpls
    Apply to site list (101, 102, 103), VPN 1 → Activate

    Verify:

    Edge01# show sdwan app-route sla-class

    Edge01# show sdwan app-route stats

    Inject loss/delay on MPLS link via CML link conditioning → confirm stream shifts to biz-internet → remove conditioning → confirm shift back to mpls.


    Policy Exercise 2 — Transport failover (full MPLS outage)
    Scenario: MPLS goes completely dark at Edge02. All traffic must move to INET automatically.

    Why: A BFD-down event causes OMP to withdraw the mpls TLOC for that site. All app-route decisions that depended on it automatically use the remaining color.

    Config:

    Add a Control Policy preference entry: site 102, primary TLOC = mpls, backup = biz-internet → Activate

    Trigger the outage:

    Edge02# conf t

    Edge02(config)# interface GigabitEthernet2

    Edge02(config-if)# shutdown

    Verify:

    Edge02# show sdwan bfd sessions

    Edge01# show sdwan omp tlocs | section 10.0.2

    Edge01# ping vpn 1 10.102.0.1

    Ping should still succeed — now entirely over biz-internet.

    Recover:

    Edge02(config-if)# no shutdown

    Edge02# show sdwan bfd sessions

    mpls TLOC and BFD session reappear; traffic migrates back automatically.


    Policy Exercise 3 — VPN segmentation (guest/IoT isolation)
    Scenario: VPN 2 (guest/IoT) must never reach VPN 1 (corporate) even though both VPNs share the same edges and transports.

    Why: Separate VPN = separate routing table + separate OMP context. Isolation is structural, not ACL-dependent.

    Config:

    VPN 2 feature template already included in Branch-Edge-Base (Step 2)
    Re-attach Branch-Edge-Base to all edges if VPN 2 wasn't in the original push; supply VPN 2 prefix variables

    Verify:

    Edge01# show sdwan omp routes vpn 1

    Edge01# show sdwan omp routes vpn 2

    Routes appear in separate contexts.

    Cross-VPN ping should fail (structural isolation):

    Edge01# ping vpn 1 10.202.0.1

    Intra-VPN 2 ping should succeed:

    Edge01# ping vpn 2 10.202.0.1


    Policy Exercise 4 — Hub-and-spoke topology (corporate VPN 1 only)
    Scenario: Edge02 and Edge03 must reach each other only via Edge01. Direct spoke-to-spoke forwarding in VPN 1 is not permitted. VPN 2 stays full mesh.

    Why: A control policy suppresses spoke sites from learning each other's TLOCs via OMP — the spokes never attempt to build a direct tunnel. Cheaper and more auditable than a data-plane redirect.

    Config:

    Branch-Traffic-Policy → Traffic Rules → Topology → Add Topology → Hub-and-Spoke
    Hub Site List: site 101 (Edge01)
    Spoke Site List: sites 102, 103 (Edge02, Edge03)
    Apply to VPN 1 only → Activate

    Verify:

    Edge02# show sdwan omp routes vpn 1

    Route to 10.103.0.0/24 should resolve via Edge01's TLOC (10.0.1.1), not Edge03's directly.

    Edge02# show sdwan bfd sessions

    No direct BFD-driven VPN 1 forwarding to Edge03.

    End-to-end ping Edge02 → Edge03 still works (via Edge01):

    Edge02# ping vpn 1 10.103.0.1

    Edge01# show sdwan app-route stats

    VPN 2 direct path between spokes still works (untouched):

    Edge02# ping vpn 2 10.203.0.1


    State progression summary
    State
    What is true
    Unassigned (start)
    ZTP done, certs valid, no service config, no BFD, no OMP
    In Sync
    Template attached and accepted; config exists, data plane unverified
    Fabric up
    BFD up both colors all pairs, OMP routes exchanging, pings verified
    Exercise 1 done
    Voice traffic prefers MPLS; auto-migrates to INET on quality breach
    Exercise 2 done
    Full MPLS loss at one site → auto-failover → auto-recovery
    Exercise 3 done
    VPN 2 structurally isolated from VPN 1 across all edges
    Exercise 4 done
    VPN 1 spoke-to-spoke transits Edge01; VPN 2 remains full mesh



    Useful CLI reference
    # Control plane

    show sdwan control connections

    show sdwan omp peers

    show sdwan omp routes vpn 1

    show sdwan omp tlocs

    # Data plane

    show sdwan bfd sessions

    show sdwan app-route stats

    show sdwan app-route sla-class

    # Policy

    show sdwan policy from-vsmart

    show sdwan policy data-policy-filter

    # Interface / VPN

    show sdwan interface

    show ip route vrf 1

    ping vpn 1 <ip> source <ip>


    Natural next steps
    Add a 4th edge → verify it inherits Branch-Edge-Base with only variable changes
    Add a 3rd color (lte) to one edge → observe app-route with 3 path candidates
    Match DSCP or app signature in a data policy instead of a prefix list
    Introduce a selective VPN 1 ↔ VPN 2 route-leak for a shared DNS server
    Tighten BFD poll intervals and measure failover detection speed
