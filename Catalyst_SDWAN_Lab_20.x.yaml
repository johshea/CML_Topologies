        content: |-
          hostname Gateway
          !
          vrf definition inet
           rd 1:20
           route-target export 1:20
           route-target import 1:10
           route-target import 1:20
           !
           address-family ipv4
            import ipv4 unicast map RM_DEFAULT
           exit-address-family
           !
           address-family ipv6
           exit-address-family
          !
          vrf definition mpls
           rd 1:30
           route-target export 1:30
           route-target import 1:10
           route-target import 1:30
           !
           address-family ipv4
           exit-address-family
           !
           address-family ipv6
           exit-address-family
          !
          vrf definition vpn0
           rd 1:10
           route-target export 1:10
           route-target import 1:10
           route-target import 1:20
           route-target import 1:30
           !
           address-family ipv4
            import ipv4 unicast map RM_DEFAULT
           exit-address-family
           !
           address-family ipv6
           exit-address-family
          !
          ip host vrf inet validator.sdwan.local 172.16.0.201
          ip host vrf mpls validator.sdwan.local 172.16.0.201
          ip host vrf vpn0 validator.sdwan.local 172.16.0.201
          no ip domain lookup
          !
          ip dhcp pool inet
           vrf inet
           network 172.16.1.0 255.255.255.0
           default-router 172.16.1.254
           dns-server 172.16.1.254
          !
          ip dhcp pool mpls
           vrf mpls
           network 172.16.2.0 255.255.255.0
           default-router 172.16.2.254
           dns-server 172.16.2.254
          !
          interface Ethernet0/0
           vrf forwarding vpn0
           ip address 172.16.0.254 255.255.255.0
           ip nat inside
           no shutdown
          !
          interface Ethernet0/1
           vrf forwarding inet
           ip address 172.16.1.254 255.255.255.0
           ip nat inside
           no shutdown
          !
          interface Ethernet0/2
           vrf forwarding mpls
           ip address 172.16.2.254 255.255.255.0
           no shutdown
          !
          interface Ethernet7/3
           ip address dhcp
           ip nat outside
           no shutdown
          !
          router bgp 65000
           bgp router-id 172.16.0.254
           bgp log-neighbor-changes
           !
           address-family ipv4
            network 0.0.0.0
           exit-address-family
           address-family ipv4 vrf inet
            network 172.16.1.0 mask 255.255.255.0
           exit-address-family
           !
           address-family ipv4 vrf mpls
            network 172.16.2.0 mask 255.255.255.0
           exit-address-family
           !
           address-family ipv4 vrf vpn0
            network 172.16.0.0 mask 255.255.255.0
           exit-address-family
           !
          ip nat inside source list 1 interface Ethernet7/3 vrf inet overload
          ip nat inside source list 1 interface Ethernet7/3 vrf vpn0 overload
          ip dns view vrf vpn0 default
           dns forwarder 192.168.255.1
           dns forwarding source-interface Ethernet7/3
          ip dns view vrf inet default
           dns forwarder 192.168.255.1
           dns forwarding source-interface Ethernet7/3
          ip dns server
          !
          ip prefix-list PL_DEFAULT seq 5 permit 0.0.0.0/0
          !
          ip access-list standard 1
           10 permit 10.0.0.0 0.0.0.255
           20 permit 172.16.0.0 0.15.255.255
           30 permit 192.168.0.0 0.0.255.255
          !
          route-map RM_DEFAULT permit 10
           match ip address prefix-list PL_DEFAULT
          !
