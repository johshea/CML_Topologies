lab:
  description: 'EIGRP named-mode lab mirroring the OSPF-Focused lab''s parameters:
    static route redistribution with tags and tuned composite metrics, distribute-list
    route-map tag filtering, per-interface summarization, delay-based metric manipulation,
    and EIGRP stub routing. Part A is IPv4-only; Part B extends to dual-stack IPv6
    under the same named-mode process.'
  notes: |
    EIGRP-Focused Lab: Redistribution, Tagging & Metrics
    =====================================================

    OVERVIEW
    Named-mode EIGRP (AS 100) dual-stack lab mirroring the OSPF lab's topology
    and teaching goals: 3-router core (R1/R2/R3, full mesh) + 2 ASBRs each
    redistributing tagged statics + 1 stub router. Cat8000v, IOS-XE.

    TOPOLOGY
    - R1-CORE, R2-CORE, R3-CORE: full-mesh core, single "router eigrp CORE" process
    - R1<->R3 direct link deliberately de-preferred via delay 500000 (both ends)
      so traffic prefers the R1-R2-R3 indirect path
    - ASBR1-EIGRP (off R1): redistributes 172.20.10.0/24 + .11.0/24 (tag 100),
      summarized to 172.20.8.0/21; IPv6 mirrors: 2001:db8:2010::/64 + :2011::/64
      (tag 100) -> 2001:db8:2010::/60
    - ASBR2-EIGRP (off R2): redistributes 172.20.20.0/24 + .21.0/24 (tag 200),
      summarized to 172.20.16.0/21; IPv6 mirrors: 2001:db8:2020::/64 + :2021::/64
      (tag 200) -> 2001:db8:2020::/60
    - STUB3-EIGRP (off R3): eigrp stub connected summary

    FEATURES DEMONSTRATED
    - EIGRP named-mode config structure, single process hosting both IPv4 and
      IPv6 address-families (contrast: OSPF needs two separate processes)
    - Composite metric (bandwidth/delay/reliability/load/MTU) and delay-based
      path manipulation, shared automatically across v4/v6 (one delay command,
      both AFs) unlike OSPF's separate per-AF cost
    - Static redistribution with tagging + metric via route-map (no inline tag
      keyword unlike OSPF's redistribute ... tag)
    - Per-interface summary-address (af-interface submode) - structurally
      different from OSPF's per-area model, no tag support
    - distribute-list route-map ... in for tag-based RIB filtering
    - eigrp stub connected summary - contrasted in detail against OSPF stub
      areas (restricts what's advertised/queried, not what's received - STUB3
      keeps a FULL routing table, unlike OSPF's totally-stubby BR3)

    VERIFIED LIVE
    - All 6 EIGRP neighbor adjacencies up (IPv4 and IPv6) across all 6 links
    - Delay tuning confirmed effective: R1's route to R3's loopback prefers
      via R2 (10.100.12.2), direct link present in topology but not successor
    - STUB3 confirmed with full routing table; R3 shows STUB3 as
      "Stub Peer Advertising (CONNECTED SUMMARY), Suppressing queries"

    PLATFORM GOTCHA (discovered live)
    On this IOS-XE build, both "redistribute static route-map ..." and
    "distribute-list route-map ... in" are REJECTED if placed directly under
    "address-family ipv4|ipv6 unicast autonomous-system N". They must go
    inside that AF's "topology base" submode instead. This was missed on the
    initial config push (no error surfaced during bulk startup-config
    application, but the lines silently never landed) and only caught by
    diffing running-config against intent - fixed live on all 3 redistribution
    points (ASBR1, ASBR2, R1's distribute-list).

    KEY DISCOVERED NUANCE: v4 vs v6 summarization asymmetry
    IPv4 summary-address gives FULL suppression: individual /24 components
    never appear anywhere outside their ASBR. IPv6 summary-address (prefix
    form) gives only PARTIAL suppression: one /64 component per ASBR leaks
    through the domain as an individual EX route with its tag intact,
    alongside the /60 summary.

    Direct consequence for distribute-list route-map DENY-TAG-200 on R1:
    it does NOT filter 172.20.16.0/21 (v4 summary, untagged - filter has
    nothing to match). It DOES filter 2001:db8:2021::/64 (v6 leaked
    component, tag 200 intact) while letting 2001:db8:2020::/60 (untagged
    v6 summary) through. Confirmed live on both address families.

    **Part A** covers EIGRP/IPv4 only, in depth. **Part B** extends the same topology to dual-stack IPv6 — and unlike OSPF (where v2 and v3 are genuinely separate processes), EIGRP named mode runs both address families under a *single* process container, which is one of the bigger structural differences covered in Part B.

    ## Table of Contents

    **Part A — EIGRP (IPv4-only)**

    1. [Overview and Learning Objectives](#1-overview-and-learning-objectives)
    2. [Topology](#2-topology)
    3. [Addressing Plan](#3-addressing-plan)
    4. [EIGRP Named Mode Structure](#4-eigrp-named-mode-structure)
    5. [The Composite Metric and Why It Matters](#5-the-composite-metric-and-why-it-matters)
    6. [Static Route Redistribution, Tagging, and Metric](#6-static-route-redistribution-tagging-and-metric)
    7. [Per-Interface Summarization](#7-per-interface-summarization)
    8. [Metric Manipulation with `delay`](#8-metric-manipulation-with-delay)
    9. [EIGRP Stub Routing](#9-eigrp-stub-routing)
    10. [Tag-Based Filtering with `distribute-list route-map`](#10-tag-based-filtering-with-distribute-list-route-map)
    11. [Verification Cheat-Sheet (Part A)](#11-verification-cheat-sheet-part-a)

    **Part B — Dual-Stack Extension (IPv6)**

    12. [IPv6 EIGRP on the Same Topology](#12-ipv6-eigrp-on-the-same-topology)
    13. [What's Identical vs. What's Different](#13-whats-identical-vs-whats-different)
    14. [Verification Cheat-Sheet (Part B)](#14-verification-cheat-sheet-part-b)

    **Reference**

    15. [Exercises](#15-exercises)
    16. [Addressing Reference Tables](#16-addressing-reference-tables)

    ---

    ## 1. Overview and Learning Objectives

    Same shape as the OSPF lab, same underlying questions — how do external routes get in, how are they tagged and filtered as they move, how is their cost computed, and how does the protocol let part of the topology opt out of being a transit path — answered with EIGRP's toolkit instead of OSPF's.

    By the end you will have hands-on, verified configuration for:

    - **EIGRP named mode** (`router eigrp NAME` / `address-family ipv4|ipv6 unicast autonomous-system N`), the modern IOS-XE configuration model
    - The **composite metric** (bandwidth, delay, reliability, load, MTU) and how it differs fundamentally from OSPF's single scalar cost
    - **`redistribute static`** with an explicit metric vector and a **tag**, set via a route-map (EIGRP's `redistribute` has no inline `tag` keyword — tags require a route-map, unlike OSPF)
    - **Per-interface summarization** (`summary-address` under `af-interface`) — a structurally different model from OSPF's per-area `area range`
    - **Metric manipulation** via the `delay` interface command, deliberately overriding EIGRP's default path preference
    - **EIGRP stub routing** (`eigrp stub connected summary`) and exactly how it differs mechanically from an OSPF stub *area*
    - **`distribute-list route-map ... in`** for tag-based RIB filtering — same concept as the OSPF lab, confirming it works identically here
    - The feasibility condition and why EIGRP can fail over to a backup path instantly, without anything resembling OSPF's SPF recomputation

