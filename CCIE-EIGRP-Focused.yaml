    ## 4. EIGRP Named Mode Structure

    Everything in this lab uses EIGRP **named mode** — the modern IOS-XE configuration model that replaced the older "classic" `router eigrp <AS-number>` style. The container itself is just a name (`CORE` in this lab, arbitrary), with the real EIGRP instance created underneath it per address family:

    ```text
    router eigrp CORE
     address-family ipv4 unicast autonomous-system 100
      eigrp router-id 10.100.0.1
      network 10.100.0.1 0.0.0.0
      ...
     exit-address-family
     address-family ipv6 unicast autonomous-system 100
      eigrp router-id 10.100.0.1
      ...
     exit-address-family
    ```

    > **This is already a structural difference from OSPF worth flagging early:** OSPFv2 and OSPFv3 are two entirely separate processes with separate `router ospf` / `ipv6 router ospf` configuration trees that happen to run on the same router. EIGRP named mode instead gives you **one process container** (`router eigrp CORE`) with IPv4 and IPv6 as sibling address-families inside it — closer to how BGP handles multi-AFI than to how classic OSPF does. Section 13 covers this in more depth.

    A few structural notes that matter later:
    - **`network` statements still enable IPv4 EIGRP on interfaces** (unchanged from classic mode) — named mode moved *parameter* configuration (passive-interface, authentication, summarization) into `af-interface` submode, but interface *activation* for IPv4 is still via `network`.
    - **IPv6 EIGRP has no `network` statement at all** — it's enabled directly per-interface with `ipv6 eigrp 100`, matching OSPFv3's per-interface activation model rather than OSPFv2's.
    - **`af-interface`** is where you configure anything that used to be a raw interface command in classic mode — `passive-interface`, `summary-address`, authentication, hello/hold timers.

    ---

    ## 5. The Composite Metric and Why It Matters

    OSPF's cost is a single number you can reason about by eye. EIGRP's metric is a composite of up to five interface characteristics — **bandwidth, delay, reliability, load, MTU** — combined through a formula. With default K-values (K1=K3=1, K2=K4=K5=0), the formula simplifies to:

    ```
    metric = 256 × ( 10,000,000 / min-bandwidth-on-path(Kbps)  +  sum-of-delays-on-path(tens of µs) / 10 )
    ```

    Two consequences that shape this whole lab:

    1. **Bandwidth is the *minimum* along the path** (a bottleneck-link calculation), while **delay is a *sum*** along the path — they behave completely differently as the path gets longer. This is why Section 8 tunes `delay`, not `bandwidth`: delay accumulates predictably hop by hop, making it the more surgical tool for "make this specific path worse."
    2. **The metric is a generic interface property, not a protocol-specific one.** `bandwidth` and `delay` are interface characteristics that both EIGRP IPv4 and EIGRP IPv6 read from the same place — unlike OSPF, where `ip ospf cost` and `ipv6 ospf cost` are two entirely separate knobs you'd have to set twice. One `delay 500000` command affects both address families at once (confirmed live in Section 8).

    ---

    ## 6. Static Route Redistribution, Tagging, and Metric

    Both ASBRs redistribute a pair of `ip route ... Null0` statics, same pattern as the OSPF lab. The key difference: EIGRP's `redistribute` command has **no inline `tag` keyword** the way OSPF's does (`redistribute static ... tag 100`). Tagging requires a route-map:

    ```text
    ip route 172.20.10.0 255.255.255.0 Null0
    ip route 172.20.11.0 255.255.255.0 Null0
    !
    route-map TAG-METRIC-100 permit 10
     set tag 100
     set metric 100000 2000 255 1 1500
    !
    router eigrp CORE
     address-family ipv4 unicast autonomous-system 100
      redistribute static route-map TAG-METRIC-100
    ```

    The `set metric` five-tuple is `bandwidth(Kbps) delay(tens-of-µs) reliability(0-255) load(0-255) MTU(bytes)` — this is what gets attached to the redistributed route as its *initial* EIGRP metric at the point of redistribution, then normal path-accumulation rules apply as it propagates from there.

    > **Platform gotcha, confirmed live:** on this Cat8000v/IOS-XE build, `redistribute static route-map ...` is **rejected** (`% Invalid input`) if entered directly under `address-family ipv4|ipv6 unicast autonomous-system N`. It has to go inside that address-family's `topology base` submode instead:
    > ```text
    > router eigrp CORE
    >  address-family ipv4 unicast autonomous-system 100
    >   topology base
    >    redistribute static route-map TAG-METRIC-100
    >   exit-af-topology
    > ```
    > The same is true of `distribute-list route-map ... in` (Section 10). This isn't documented anywhere obvious — it was only caught by checking `show run | section router eigrp` after an initial push and noticing the line simply wasn't there, with no redistributed routes reaching the core. Worth remembering: named-mode EIGRP silently declining to apply a line during a bulk config push is a lot harder to notice than an outright rejection at an interactive prompt.

    > **Confirm live:** `show ip route 172.20.8.0` on R1 shows the route as `D` — not `D EX`. That's because what R1 actually receives is ASBR1's locally-generated **summary** (Section 7), and EIGRP summary routes are classified as internal regardless of what fed them. The `EX` designation only shows up on individual external routes that reach a router *untouched* — which happens here too, just not where you'd first expect it (Section 7). `show ip eigrp topology 172.20.8.0/21` on ASBR1 shows the full bandwidth/delay/reliability/load/MTU breakdown that produced the metric.

    ---

    ## 7. Per-Interface Summarization

    EIGRP summarization is configured **on the interface the summary exits from**, not on a designated boundary-router type the way OSPF's `area range` is configured per-area on an ABR:

    ```text
    router eigrp CORE
     address-family ipv4 unicast autonomous-system 100
      af-interface GigabitEthernet1
       summary-address 172.20.8.0 255.255.248.0
      exit-af-interface
    ```

    Configured on ASBR1's Gi1 (the interface pointing back toward R1/the rest of the domain), this suppresses `172.20.10.0/24` and `172.20.11.0/24` individually and advertises only `172.20.8.0/21` out that interface.

    > **No tag support on `summary-address`.** Unlike OSPF, where both `area range` and `summary-address` accept an optional `tag` keyword to explicitly tag the aggregate, EIGRP's `summary-address` has no such option. The summary route carries no tag of its own — confirmed live: `show ip route 172.20.8.0` on R1/R2/R3 shows the `/21` with no tag field at all, even though both components were tagged 100 at redistribution.

    > **Confirmed live — IPv4 vs. IPv6 suppression is not symmetric.** For IPv4, `summary-address 172.20.8.0 255.255.248.0` and `summary-address 172.20.16.0 255.255.248.0` fully suppress their components: `show ip route 172.20.10.0 255.255.255.0` and `172.20.20.0 255.255.255.0` come back `% Subnet not in table` everywhere outside their originating ASBR. For IPv6, the equivalent `summary-address 2001:DB8:2010::/60` and `2001:DB8:2020::/60` only *partially* suppress: one component from **each** ASBR leaks through the domain as an individual `EX` route with its tag intact —
    > ```text
    > D   2001:DB8:2010::/60 [90/10296320]
    > EX  2001:DB8:2011::/64 [170/10296320], tag 100
    > D   2001:DB8:2020::/60 [90/20541440]
    > EX  2001:DB8:2021::/64 [170/20541440], tag 200
    > ```
    > as seen on R1. This is the same shape of finding as the OSPFv2-vs-OSPFv3 `summary-address`/`summary-prefix` asymmetry from the OSPF lab — full suppression on the v4 side, partial leakage on the v6 side — reproduced here on a completely different protocol. It's worth treating as a real platform characteristic rather than a one-off, since it showed up independently in two different labs.

    ---

    ## 8. Metric Manipulation with `delay`

    R1 and R3 have a direct link *and* an indirect one through R2. Left at defaults, EIGRP would pick whichever has the lower composite metric — with all-Gigabit links and no tuning, the direct link (one hop) naturally wins over the two-hop path via R2. This lab overrides that with `delay`:

    ```text
    interface GigabitEthernet2
     delay 500000
    ```

    configured on **both** R1's and R3's side of the direct link (delay, like bandwidth, is a per-interface, per-direction property — same reasoning as the OSPF lab's `ip ospf cost`, set on both ends for a fully symmetric "avoid this link" result).

    > **Confirm live:** `show ip route 10.100.0.3` on R1 — next-hop should be R2 (10.100.12.2), not the direct link. `show ip eigrp topology` on R1 should show the direct-link path to R3 present but *not selected* — worth checking whether it still qualifies as a **feasible successor** (Exercise 4) even though it's not the successor.

    > **Unequal-cost load balancing (not deployed, but worth knowing):** EIGRP's `variance <multiplier>` command (default 1 = equal-cost only) allows using multiple feasible successors simultaneously, proportioned to their metric ratio — something OSPF has no equivalent for at all. This lab leaves `variance` at its default specifically so the delay-tuning result in this section is unambiguous; Exercise 5 has you calculate what variance value would be needed to bring the direct R1–R3 link back into use.

    ---

    ## 9. EIGRP Stub Routing

    STUB3 is configured as a stub:

    ```text
    router eigrp CORE
     address-family ipv4 unicast autonomous-system 100
      eigrp stub connected summary
    ```

    This is worth contrasting carefully with OSPF's stub *area* mechanism from the OSPF lab, because the two "stub" concepts solve different problems with different mechanics:

    | | OSPF stub area | EIGRP stub router |
    |---|---|---|
    | Configured on | The **ABR** (and matched by all routers in the area) | The **stub router itself** |
    | What it restricts | What LSA *types* are allowed to flow **into** the area (Type-3/Type-5 blocked, replaced by a default) | What that router **advertises** to its neighbors (only connected/summary/static/redistributed routes, per the keywords given) |
    | Effect on neighbors | The stub router (e.g. BR3) sees a *reduced* view of the network | The stub router's **neighbor** (R3) stops sending EIGRP **queries** to it during DUAL recomputation, treating it as a non-transit leaf |
    | Does the stub router still learn full routing info? | **No** — totally stubby leaves it with just a default route | **Yes** — nothing in `eigrp stub` restricts what STUB3 *receives* from R3; it still gets the domain's full EIGRP topology unless something else filters it |

    > **Confirm live and compare directly against the OSPF lab:** `show ip route` on STUB3 — unlike BR3 in the OSPF lab (which had almost nothing but a default route), STUB3 should have full visibility into the EIGRP domain's routes. What's different is what STUB3 tells R3 about *itself*, and how R3 treats STUB3 during convergence events — check `show ip eigrp neighbors detail` on R3 and look for the stub flags/received-only indication for the STUB3 adjacency.

    ---

    ## 10. Tag-Based Filtering with `distribute-list route-map`

    Same concept, same command family, as the OSPF lab — R1 is configured to refuse tag-200 routes (ASBR2's) into its own RIB. Like `redistribute`, this command only actually applies inside `topology base` on this platform (Section 6):

    ```text
    route-map DENY-TAG-200 deny 10
     match tag 200
    route-map DENY-TAG-200 permit 20
    !
    router eigrp CORE
     address-family ipv4 unicast autonomous-system 100
      topology base
       distribute-list route-map DENY-TAG-200 in
    ```

    EIGRP is a distance-vector protocol, not link-state — so unlike OSPF, there isn't a shared LSA database to preserve; EIGRP routers only ever advertise their own *best* routes to neighbors in the first place. That makes the RIB-vs-advertisement distinction from the OSPF lab slightly different here: this filter blocks the route from R1's RIB, and since R1 never advertises what it doesn't select as best, this could in principle affect what R1 tells R2 or R3 too — worth confirming directly rather than assuming (Exercise 6).

    > **Confirmed live — the filter is real but narrower than it looks.** `show ip route 172.20.16.0` on R1 still shows the route — the untagged `/21` summary sails right through `match tag 200`, because (Section 7) the summary itself carries no tag. The filter isn't broken; it's doing exactly what a tag match should do, it just has nothing tagged to match against once summarization has stripped the tag. The IPv6 side proves the filter *does* work when there's something to catch: `show ipv6 route 2001:DB8:2021::/64` on R1 comes back **absent** (filtered — that route is the leaked, still-tagged component from Section 7), while `2001:DB8:2020::/60` (the untagged summary) is present, same as the v4 case. Net effect: `distribute-list route-map` here filters individually-tagged routes, but is blind to anything that's been folded into an untagged summary — a real limitation to design around, not a config mistake.

