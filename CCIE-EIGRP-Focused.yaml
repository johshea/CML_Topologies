    ## 12. IPv6 EIGRP on the Same Topology

    Part B adds IPv6 to every interface and loopback already built in Part A, activated under **the same `router eigrp CORE` process** — a second address-family, not a second process. That's the headline structural difference from the OSPF lab, where Part B needed an entirely separate `ipv6 router ospf` process.

    ### 12.1 Addressing (mirrors Part A)

    Redistributed IPv6 statics: ASBR1 → `2001:db8:2010::/64`, `2001:db8:2011::/64` (tag 100, summarized to `2001:db8:2010::/60`); ASBR2 → `2001:db8:2020::/64`, `2001:db8:2021::/64` (tag 200, summarized to `2001:db8:2020::/60`).

    ### 12.2 Config — same process, sibling address-family

    ```text
    interface GigabitEthernet1
     ipv6 address 2001:DB8:100:12::1/64
     ipv6 eigrp 100
    !
    router eigrp CORE
     address-family ipv6 unicast autonomous-system 100
      eigrp router-id 10.100.0.1
      distribute-list route-map DENY-TAG-200-V6 in
      af-interface Loopback0
       passive-interface
      exit-af-interface
     exit-address-family
    ```

    Note there's no `network` statement anywhere in the IPv6 address-family — activation is entirely via `ipv6 eigrp 100` on each interface, matching OSPFv3's model rather than EIGRP's own IPv4 model.

    ---

    ## 13. What's Identical vs. What's Different

    | Concept | EIGRP IPv4 (Part A) | EIGRP IPv6 (Part B) | Verdict |
    |---|---|---|---|
    | Process container | `router eigrp CORE` | **Same** `router eigrp CORE`, sibling address-family | **Genuinely different from OSPF** — one process, not two |
    | Interface activation | `network` statement | `ipv6 eigrp 100` per interface | **Different mechanism** — no `network` in v6 at all |
    | Route tags | `set tag` in a route-map | Identical | **Same** |
    | Composite metric / `delay` tuning | Interface-level `delay`, shared with... | ...the same interface-level `delay` — one setting, both AFs | **Literally the same value**, not just the same concept |
    | Redistribution | `redistribute static route-map ...` | Identical | **Same** |
    | Summarization | `summary-address` under `af-interface`, no tag support | Identical, prefix/length notation instead of address+mask | **Same command, same tag limitation** |
    | Stub routing | `eigrp stub connected summary` | Identical | **Same** |
    | `distribute-list route-map` | Supported | Supported | **Same** — confirm live in your build |

    > **The one-process-two-address-families model is the biggest conceptual takeaway from Part B.** It means EIGRP IPv4 and IPv6 share neighbor relationships at the protocol level more tightly than OSPFv2/OSPFv3 ever do — though each address-family still maintains its own topology table and neighbor state. Worth checking directly: does `show ip eigrp neighbors` and `show ipv6 eigrp neighbors` on the same router show the same neighbor list, or does each AF still track adjacencies independently? (Exercise 9.)

    ---

    ## 14. Verification Cheat-Sheet (Part B)

    ```text
    show ipv6 eigrp neighbors
    show ipv6 eigrp topology
    show ipv6 route eigrp
    show ipv6 route 2001:DB8:2010::/60
    show ipv6 route 2001:DB8:2020::/60
