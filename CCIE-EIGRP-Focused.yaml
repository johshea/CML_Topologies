    ## 15. Exercises

    **1. Redistribution metric, end to end.** On ASBR1, run `show ip eigrp topology 172.20.8.0/21` and note the composite metric. Walk the math by hand using the formula in Section 5 (bandwidth=100000 Kbps, delay=2000 tens-of-µs at the point of redistribution) and confirm it matches what's displayed.

    **2. Summarization gap, and why IPv6 tells a different story.** Confirm `172.20.16.0/21` (ASBR2's summary) has no tag when viewed via `show ip route 172.20.16.0` on R1, and that `distribute-list route-map DENY-TAG-200 in` does *not* filter it out despite matching `tag 200` — the summary has no tag to match. Now check the IPv6 side: `show ipv6 route eigrp` on R1 shows `2001:DB8:2021::/64` (tag 200) filtered out while `2001:DB8:2020::/60` gets through. Why does the same `distribute-list` line produce a different practical result for v4 vs. v6 traffic toward ASBR2's block? (Hint: it's not the filter that's different — Section 7.)

    **3. Feasible successor.** After the delay tuning in Section 8, check `show ip eigrp topology` (not `topology all-links`) on R1 for the route to `10.100.0.3` (R3's loopback). Is the direct R1–R3 path listed at all? If not, check `show ip eigrp topology all-links` — what's the difference between what these two commands show, and why does it matter for understanding feasible successors?

    **4. Break the feasibility condition.** Increase the delay on the R1–R3 link even further (try `delay 5000000`). At what point (if any) does the direct link stop being usable *even as a backup* — i.e., stop satisfying the feasibility condition (its reported distance from R3 must be less than R1's feasible distance via R2)? Explain in your own words why EIGRP enforces this condition before accepting a path as a loop-free backup.

    **5. Variance.** Calculate what `variance` multiplier on R1 would be needed to bring the direct R1–R3 link back into active (unequal-cost) use alongside the via-R2 path, given the metrics you observed in Exercise 1 and 3. Configure it and confirm with `show ip route 10.100.0.3` — do you see two next-hops now?

    **6. RIB filter vs. advertisement.** Section 10 raises the question of whether `distribute-list route-map` on R1 affects what R1 advertises onward to R2/R3, given EIGRP only ever advertises its own best route. Test it: check `show ip route 172.20.16.0` on R2 and R3 — is it present via R1, or only via the direct R2–ASBR2 path? Explain what you find.

    **7. Stub query scoping.** On R3, run `show ip eigrp neighbors detail` and find the STUB3 adjacency. What does it say about STUB3's advertised capabilities? Then simulate a topology change elsewhere in the network (e.g., flap the R1–R3 link) and use `debug eigrp packets query` (careful — verbose) or `show ip eigrp topology` timing to confirm R3 does *not* send a query to STUB3 during the resulting recomputation.

    **8. `eigrp stub` keyword variations.** `eigrp stub` supports several keywords beyond `connected summary` used here — `static`, `redistributed`, `receive-only`. Reconfigure STUB3 with `eigrp stub receive-only` instead and observe what changes about what STUB3 advertises (hint: `receive-only` is the most restrictive — it advertises nothing at all).

    **9. One process, two address families.** Compare `show ip eigrp neighbors` and `show ipv6 eigrp neighbors` on R1. Do the neighbor lists match? Do they converge independently if you flap just the IPv6 address on one interface while leaving IPv4 up? What does this tell you about how tightly coupled the two address-families actually are under the single named-mode process?

    **10. Convert one router back to classic mode.** As a stretch goal, reconfigure R2 using classic-mode EIGRP (`router eigrp 100` at the top level, no address-family) instead of named mode, for IPv4 only. Confirm the adjacency to R1 and R3 still comes up — classic and named mode routers interoperate fine as EIGRP peers, since the on-the-wire protocol is identical; only the *configuration model* differs.

