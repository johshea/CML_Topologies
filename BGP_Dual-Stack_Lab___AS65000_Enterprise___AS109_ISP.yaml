nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname ISP-Router
          !
          no ip domain-lookup
          ipv6 unicast-routing
          ipv6 cef
          ip cef
          !
          interface Loopback0
           ip address 10.0.0.100 255.255.255.255
           ipv6 address 2001:db8:100::1/128
           ipv6 enable
          !
          interface Loopback1
           ip address 198.51.100.1 255.255.255.0
           description SIMULATED-INTERNET-IPv4
          !
          interface Loopback2
           ipv6 address 2001:db8:ffff::1/48
           description SIMULATED-INTERNET-IPv6
          !
          interface Ethernet0/0
           description TO-WAN-EDGE
           ip address 10.1.0.1 255.255.255.252
           ipv6 address 2001:db8:1::0/127
           ipv6 enable
           bfd interval 300 min_rx 300 multiplier 3
           no shutdown
          !
          ip route 0.0.0.0 0.0.0.0 Null0
          ipv6 route ::/0 Null0
          !
          router bgp 109
           bgp router-id 10.0.0.100
           bgp log-neighbor-changes
           no bgp default ipv4-unicast
           neighbor 10.1.0.2 remote-as 65000
           neighbor 10.1.0.2 description EBGP-TO-WAN-EDGE-IPv4
           neighbor 10.1.0.2 password Cisc0Lab!
           neighbor 10.1.0.2 bfd
           neighbor 2001:db8:1::1 remote-as 65000
           neighbor 2001:db8:1::1 description EBGP-TO-WAN-EDGE-IPv6
           neighbor 2001:db8:1::1 password Cisc0Lab!
           !
           address-family ipv4
            network 10.0.0.100 mask 255.255.255.255
            network 198.51.100.0 mask 255.255.255.0
            default-information originate
            neighbor 10.1.0.2 activate
            neighbor 10.1.0.2 send-community both
            neighbor 10.1.0.2 route-map ISP-TO-ENT-v4 out
            neighbor 10.1.0.2 route-map ENT-TO-ISP-v4 in
            neighbor 10.1.0.2 soft-reconfiguration inbound
           exit-address-family
           !
           address-family ipv6
            network 2001:db8:100::1/128
            network 2001:db8:ffff::/48
            neighbor 2001:db8:1::1 activate
            neighbor 2001:db8:1::1 send-community both
            neighbor 2001:db8:1::1 route-map ISP-TO-ENT-v6 out
            neighbor 2001:db8:1::1 route-map ENT-TO-ISP-v6 in
            neighbor 2001:db8:1::1 soft-reconfiguration inbound
           exit-address-family
          !
          route-map ISP-TO-ENT-v4 permit 10
           set community 109:1000 additive
          !
          route-map ISP-TO-ENT-v6 permit 10
          !
          route-map ENT-TO-ISP-v4 permit 10
          !
          route-map ENT-TO-ISP-v6 permit 10
          !
          bfd slow-timers 5000
          !
          username admin privilege 15 secret Cisc0Lab!
          ip ssh version 2
          crypto key generate rsa modulus 2048
          line vty 0 4
           login local
           transport input ssh
          !
          end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: iol-xe-17-18-02
    label: ISP-Router
    node_definition: iol-xe
    parameters: {}
    priority: null
    pyats:
      username: null
