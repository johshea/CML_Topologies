  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname WAN-Edge
          !
          no ip domain-lookup
          ipv6 unicast-routing
          ipv6 cef
          ip cef
          !
          interface Loopback0
           ip address 10.0.0.1 255.255.255.255
           ipv6 address 2001:db8:0:1::1/128
           ipv6 enable
           description ROUTER-ID-iBGP-SOURCE
          !
          ! === Uplink to ISP ===
          interface Ethernet0/0
           description TO-ISP-ROUTER
           ip address 10.1.0.2 255.255.255.252
           ipv6 address 2001:db8:1::1/127
           ipv6 enable
           bfd interval 300 min_rx 300 multiplier 3
           no shutdown
          !
          ! === Link to RR-Core ===
          interface Ethernet0/1
           description TO-RR-CORE
           ip address 10.1.1.1 255.255.255.252
           ipv6 address 2001:db8:1:1::0/127
           ipv6 enable
           bfd interval 300 min_rx 300 multiplier 3
           ip ospf 1 area 0
           ipv6 ospf 1 area 0
           no shutdown
          !
          ! === OSPF IGP ===
          router ospf 1
           router-id 10.0.0.1
           passive-interface default
           no passive-interface Ethernet0/1
           network 10.0.0.1 0.0.0.0 area 0
           network 10.1.1.0 0.0.0.3 area 0
          !
          ipv6 router ospf 1
           router-id 10.0.0.1
           passive-interface default
           no passive-interface Ethernet0/1
          !
          ! === Prefix Lists ===
          ip prefix-list ACCEPT-FROM-ISP seq 5 permit 0.0.0.0/0
          ip prefix-list ACCEPT-FROM-ISP seq 10 permit 198.51.100.0/24
          ip prefix-list ACCEPT-FROM-ISP seq 100 deny 0.0.0.0/0 le 32
          !
          ip prefix-list ADVERTISE-TO-ISP seq 5 permit 10.10.1.0/24
          ip prefix-list ADVERTISE-TO-ISP seq 10 permit 10.10.2.0/24
          ip prefix-list ADVERTISE-TO-ISP seq 15 permit 10.10.3.0/24
          ip prefix-list ADVERTISE-TO-ISP seq 100 deny 0.0.0.0/0 le 32
          !
          ipv6 prefix-list ACCEPT-FROM-ISP-v6 seq 5 permit ::/0
          ipv6 prefix-list ACCEPT-FROM-ISP-v6 seq 10 permit 2001:db8:ffff::/48
          ipv6 prefix-list ACCEPT-FROM-ISP-v6 seq 100 deny ::/0 le 128
          !
          ipv6 prefix-list ADVERTISE-TO-ISP-v6 seq 5 permit 2001:db8:10:1::/64
          ipv6 prefix-list ADVERTISE-TO-ISP-v6 seq 10 permit 2001:db8:10:2::/64
          ipv6 prefix-list ADVERTISE-TO-ISP-v6 seq 15 permit 2001:db8:10:3::/64
          ipv6 prefix-list ADVERTISE-TO-ISP-v6 seq 100 deny ::/0 le 128
          !
          ! === Route-maps ===
          ip community-list standard ISP-DEFAULT permit 109:1000
          !
          route-map EBGP-IN-IPv4 permit 10
           match ip address prefix-list ACCEPT-FROM-ISP
           set community 65000:100 additive
           set local-preference 200
          !
          route-map EBGP-OUT-IPv4 permit 10
           match ip address prefix-list ADVERTISE-TO-ISP
           set community 65000:100
          !
          route-map EBGP-IN-IPv6 permit 10
           match ipv6 address prefix-list ACCEPT-FROM-ISP-v6
           set local-preference 200
          !
          route-map EBGP-OUT-IPv6 permit 10
           match ipv6 address prefix-list ADVERTISE-TO-ISP-v6
          !
          ! === BGP AS 65000 ===
          router bgp 65000
           bgp router-id 10.0.0.1
           bgp log-neighbor-changes
           no bgp default ipv4-unicast
           !
           ! eBGP to ISP
           neighbor 10.1.0.1 remote-as 109
           neighbor 10.1.0.1 description EBGP-TO-ISP-IPv4
           neighbor 10.1.0.1 password Cisc0Lab!
           neighbor 10.1.0.1 bfd
           neighbor 10.1.0.1 ttl-security hops 1
           neighbor 2001:db8:1:: remote-as 109
           neighbor 2001:db8:1:: description EBGP-TO-ISP-IPv6
           neighbor 2001:db8:1:: password Cisc0Lab!
           !
           ! iBGP to RR-Core via loopback
           neighbor 10.0.0.2 remote-as 65000
           neighbor 10.0.0.2 description IBGP-TO-RR-CORE-IPv4
           neighbor 10.0.0.2 update-source Loopback0
           neighbor 10.0.0.2 bfd
           neighbor 2001:db8:0:1::2 remote-as 65000
           neighbor 2001:db8:0:1::2 description IBGP-TO-RR-CORE-IPv6
           neighbor 2001:db8:0:1::2 update-source Loopback0
           !
           address-family ipv4
            network 10.0.0.1 mask 255.255.255.255
            neighbor 10.1.0.1 activate
            neighbor 10.1.0.1 send-community both
            neighbor 10.1.0.1 route-map EBGP-IN-IPv4 in
            neighbor 10.1.0.1 route-map EBGP-OUT-IPv4 out
            neighbor 10.1.0.1 soft-reconfiguration inbound
            neighbor 10.1.0.1 prefix-list ACCEPT-FROM-ISP in
            neighbor 10.0.0.2 activate
            neighbor 10.0.0.2 send-community both
            neighbor 10.0.0.2 next-hop-self
            neighbor 10.0.0.2 soft-reconfiguration inbound
           exit-address-family
           !
           address-family ipv6
            network 2001:db8:0:1::1/128
            neighbor 2001:db8:1:: activate
            neighbor 2001:db8:1:: send-community both
            neighbor 2001:db8:1:: route-map EBGP-IN-IPv6 in
            neighbor 2001:db8:1:: route-map EBGP-OUT-IPv6 out
            neighbor 2001:db8:1:: soft-reconfiguration inbound
            neighbor 2001:db8:0:1::2 activate
            neighbor 2001:db8:0:1::2 send-community both
            neighbor 2001:db8:0:1::2 next-hop-self
            neighbor 2001:db8:0:1::2 soft-reconfiguration inbound
           exit-address-family
          !
          ip route 0.0.0.0 0.0.0.0 10.1.0.1 254
          !
          bfd slow-timers 5000
          !
          username admin privilege 15 secret Cisc0Lab!
          ip ssh version 2
          crypto key generate rsa modulus 2048
          line vty 0 4
           login local
           transport input ssh
          !
          end
