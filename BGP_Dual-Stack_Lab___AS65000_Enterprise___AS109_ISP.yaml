lab:
  description: 'Enterprise BGP lab: AS65000 with WAN-Edge (eBGP to ISP AS109), RR-Core
    as iBGP Route Reflector with 3 RR-clients (WAN-Edge, Spoke-Router, Spoke2-Router).
    Full IPv4/IPv6 dual-stack, OSPF IGP, BFD, communities, prefix filtering. Client-A
    on Spoke2-Router LAN, Client-B on Spoke-Router LAN.'
  notes: |-
    === AS Design ===
      AS 65000  Enterprise (WAN-Edge, RR-Core, Spoke-Router, Spoke2-Router)
      AS 109    ISP (ISP-Router)

    === Loopbacks (Router-IDs / iBGP peering) ===
      WAN-Edge:     10.0.0.1/32   2001:db8:0:1::1/128
      RR-Core:      10.0.0.2/32   2001:db8:0:1::2/128
      Spoke-Router: 10.0.0.3/32   2001:db8:0:1::3/128
      Spoke2-Router:10.0.0.4/32   2001:db8:0:1::4/128
      ISP-Router:   10.0.0.100/32 2001:db8:100::1/128

    === Transit Links ===
      WAN-Edge  <-> ISP:          10.1.0.0/30  2001:db8:1::/127
      WAN-Edge  <-> RR-Core:      10.1.1.0/30  2001:db8:1:1::/127
      RR-Core   <-> Spoke-Router: 10.1.2.0/30  2001:db8:1:2::/127
      RR-Core   <-> Spoke2-Router:10.1.3.0/30  2001:db8:1:3::/127

    === LAN Subnets ===
      Spoke2-Router LAN: 10.10.1.0/24  2001:db8:10:1::/64  (Client-A)
      Spoke-Router LAN:  10.10.2.0/24  2001:db8:10:2::/64  (Client-B)
      Spoke2-Router stub:10.10.3.0/24  2001:db8:10:3::/64

    === ISP Prefixes into AS65000 ===
      0.0.0.0/0, ::/0, 198.51.100.0/24, 2001:db8:ffff::/48

    === Enterprise Prefixes to ISP ===
      10.10.1.0/24, 10.10.2.0/24, 10.10.3.0/24
      2001:db8:10:1::/64, 2001:db8:10:2::/64, 2001:db8:10:3::/64

    === Credentials ===
      admin / Cisc0Lab! on all devices
      BGP MD5: Cisc0Lab!
  title: BGP Dual-Stack Lab — AS65000 Enterprise / AS109 ISP
  node_staging:
    enabled: false
    start_remaining: true
    abort_on_failure: false
  version: 0.3.1
