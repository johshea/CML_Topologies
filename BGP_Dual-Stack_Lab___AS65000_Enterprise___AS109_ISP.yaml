          interface Loopback10
           ip address 10.10.3.1 255.255.255.0
           ipv6 address 2001:db8:10:3::1/64
           description SPOKE2-STUB-PREFIX
          !
          ! === Link to RR-Core ===
          interface Ethernet0/0
           description TO-RR-CORE
           ip address 10.1.3.2 255.255.255.252
           ipv6 address 2001:db8:1:3::1/127
           ipv6 enable
           bfd interval 300 min_rx 300 multiplier 3
           ip ospf 1 area 0
           ipv6 ospf 1 area 0
           no shutdown
          !
          ! === LAN toward Client-A ===
          interface Ethernet0/1
           description LAN-CLIENT-A
           ip address 10.10.1.1 255.255.255.0
           ipv6 address 2001:db8:10:1::1/64
           ipv6 enable
           ipv6 nd prefix 2001:db8:10:1::/64
           no shutdown
