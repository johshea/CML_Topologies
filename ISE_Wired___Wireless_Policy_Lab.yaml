nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname Core-Router
          !
          ip dhcp excluded-address 192.168.100.1 192.168.100.50
          ip dhcp excluded-address 10.20.0.1 10.20.0.10
          ip dhcp excluded-address 10.30.0.1 10.30.0.10
          ip dhcp excluded-address 10.40.0.1 10.40.0.10
          !
          ip dhcp pool MGMT
           network 192.168.100.0 255.255.255.0
           default-router 192.168.100.1
           dns-server 8.8.8.8
          !
          ip dhcp pool CORP-VLAN20
           network 10.20.0.0 255.255.255.0
           default-router 10.20.0.1
           dns-server 8.8.8.8
          !
          ip dhcp pool GUEST-VLAN30
           network 10.30.0.0 255.255.255.0
           default-router 10.30.0.1
           dns-server 8.8.8.8
          !
          ip dhcp pool IOT-VLAN40
           network 10.40.0.0 255.255.255.0
           default-router 10.40.0.1
           dns-server 8.8.8.8
          !
          interface GigabitEthernet0/0
           description UPLINK-TO-SWITCH
           no ip address
           no shutdown
          !
          interface GigabitEthernet0/0.10
           encapsulation dot1Q 10
           ip address 192.168.100.1 255.255.255.0
          !
          interface GigabitEthernet0/0.20
           encapsulation dot1Q 20
           ip address 10.20.0.1 255.255.255.0
          !
          interface GigabitEthernet0/0.30
           encapsulation dot1Q 30
           ip address 10.30.0.1 255.255.255.0
          !
          interface GigabitEthernet0/0.40
           encapsulation dot1Q 40
           ip address 10.40.0.1 255.255.255.0
          !
          ip routing
          !
          ntp master 1
          !
          username admin privilege 15 secret Cisc0Lab!
          crypto key generate rsa modulus 2048
          ip ssh version 2
          line vty 0 4
           login local
           transport input ssh
          !
          end
