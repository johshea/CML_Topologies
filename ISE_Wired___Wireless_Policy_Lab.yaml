lab:
  description: Cisco ISE 3.5 wired + wireless policy lab. Cat9000v (802.1X/MAB), Cat9800
    WLC (CORP-DOT1X WPA3-Ent, GUEST-OPEN), wireless AP, wired and wireless test clients.
    Full dot1x, MAB, CoA, VLAN assignment, profiling.
  notes: |-
    VLAN Plan:
      10 = MGMT   192.168.100.0/24  GW .1
      20 = CORP   10.20.0.0/24      GW .1
      30 = GUEST  10.30.0.0/24      GW .1  (pre-auth / failed-auth)
      40 = IOT    10.40.0.0/24      GW .1  (MAB devices)

    Key IPs:
      Router:    192.168.100.1 (GW + DHCP server)
      ISE:       192.168.100.10
      Switch:    192.168.100.20 (SVI VLAN10)
      WLC:       192.168.100.30

    RADIUS secret: Cisc0Lab!
    Credentials:   admin / Cisc0Lab!

    Switch port assignments:
      Gi1/0/1 = Router trunk uplink
      Gi1/0/2 = WLC trunk uplink
      Gi1/0/3 = Wired-Corp-Client  (dot1x)
      Gi1/0/4 = Wired-IoT-Printer  (MAB)
      Gi1/0/5 = Wireless-AP        (trunk, native VLAN10)
      Gi1/0/6 = Wireless-Corp-Client (simulated wireless, dot1x)
      Gi1/0/7 = ISE management uplink
  title: ISE Wired & Wireless Policy Lab
  node_staging:
    enabled: true
    start_remaining: true
    abort_on_failure: false
  version: 0.3.1
