lab:
  description: 'Border/Spine/Leaf EVPN Multihoming fabric with hierarchical BGP RR
    design (BRKENS-2837 style): OSPF underlay, iBGP AS65000 overlay, Spines as top-tier
    RR, per-cluster Inter-ES iBGP with unique BGP Cluster-ID (1.1.1.1/1.1.1.2/1.1.1.3).
    Dedicated OOB mgmt network via mgmt0 on all Nexus nodes.'
  notes: |-
    The core problem being solved
    In a flat EVPN fabric, every leaf peers directly with every other leaf (or all peer with route reflectors that don't scale hierarchically). As you add pods/clusters, iBGP mesh size and RR table sizes grow with the square of the fabric size, and any failure or route flap has to propagate through a large flat control plane. The hierarchical design breaks this into independent tiers so each layer only deals with a bounded amount of complexity, and problems get contained close to where they happen.
    Layer by layer
    Access (L2 only, no BGP)
    The 4 switches under each cluster are pure L2 — no control-plane participation at all. They just trunk VLANs up to both ES-SW1 and ES-SW2. This is intentional: keeping BGP off the access layer means you can scale the number of access switches without touching the control plane at all. It's the cheapest layer to add capacity to.
    Leaf / ES-SW pair (Level-1: Inter-ES iBGP)
    This is the layer that makes EVPN Multihoming work. C1-ESSW1 and C1-ESSW2 peer directly with each other (the "L3" link in the diagram, Ethernet1/2 in our build). This session exists specifically to synchronize:

    Ethernet Segment (ESI) routes — so both switches agree on which access ports form a multihomed Ethernet Segment
    Designated Forwarder (DF) election — which of the pair actively forwards BUM traffic for a given VLAN, so you don't get duplicate frames from a dual-homed access switch
    MAC/IP routes learned locally — so a MAC seen on ESSW1 shows up on ESSW2 without waiting for a round-trip through the spine

    Each pair gets its own unique BGP Cluster-ID (1.1.1.1 / 1.1.1.2 / 1.1.1.3 in our build). This is what makes the pair act as its own contained routing domain — a route that originates in Cluster-1 and gets reflected back through the spine won't loop back into Cluster-1 because the cluster-id tags it as "already seen here." It's the same loop-prevention mechanism as normal BGP route reflection, just applied per-pod instead of globally.
    Benefit: a MAC move or link flap inside one distribution block stays local to that pair's session — it doesn't have to churn state across the whole fabric to converge.
    Spine (Level-2: top-tier Route Reflector)
    The spines don't originate any EVPN routes themselves — they exist purely to reflect. Every leaf pair and every border switch peers to both spines (never to each other across pods), so:

    Any leaf can reach any other leaf's routes without a full iBGP mesh — spine does the reflection
    Both spines share the same cluster-id (10.0.0.100 in our build) since they're a redundant pair acting as one logical RR — if they used different cluster-ids, a route reflected by Spine1 to a leaf, then also reflected by Spine2, could be misinterpreted as coming from two different clusters and cause duplicate/looping updates instead of being recognized as redundant paths from the same RR tier.

    Benefit: N leaf pairs need only 2×N sessions (to both spines) instead of an N² full mesh. Adding a 4th cluster means 2 new BGP sessions, not N new ones.
    Border
    Borders peer to both spines but carry only address-family ipv4 unicast — no EVPN. That's deliberate: EVPN/MAC mobility is a fabric-internal concern; the border's job is just to get IP reachability to Data Center/WAN/Internet and hand off fabric prefixes outward (or summarize them) without dragging L2VPN EVPN semantics into the WAN edge.
    Why this beats a flat design, in one sentence each

    Fault containment — a MAC flap or ESI failure inside Cluster-2 is absorbed by the Inter-ES session and doesn't require the whole fabric to reconverge.
    Linear scaling — adding a pod means 2 new spine sessions, not a growing mesh.
    Independent operational domains — you can add/remove/renumber a cluster's cluster-id without touching any other cluster's config.
    Clean separation of concerns — access has zero control-plane burden, leaf-pairs own ESI/DF state, spines own reflection, border owns external reachability. Each tier does exactly one job.
  title: Hierarchical BGP Control-Plane - EVPN Fabric
  node_staging:
    enabled: false
    start_remaining: true
    abort_on_failure: false
  version: 0.3.1
