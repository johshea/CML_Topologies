nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname GW-Router
          !
          no ip domain-lookup
          ipv6 unicast-routing
          ipv6 cef
          ip cef
          !
          interface Loopback0
           ip address 1.1.1.1 255.255.255.255
           ipv6 address 2001:db8::1/128
          !
          ! ============================================================
          ! Uplink to DHCP-Router-10  (VLAN10 segment transit)
          ! GW side: 10.10.10.1 / 2001:db8:1::1
          ! ============================================================
          interface Ethernet0/1
           description TO-DHCP10-VLAN10
           ip address 10.10.10.1 255.255.255.0
           ipv6 address 2001:db8:1::1/64
           ipv6 enable
          !
          ! RA flags for VLAN10 - STATEFUL DHCPv6
          ! M=1: clients use DHCPv6 for addresses
          ! O=1: clients use DHCPv6 for other options (DNS)
          ! no-autoconfig: suppress SLAAC on this prefix
           ipv6 nd managed-config-flag
           ipv6 nd other-config-flag
           ipv6 nd ra-interval 10
           ipv6 nd ra-lifetime 1800
           ipv6 nd prefix 2001:db8:1::/64 no-autoconfig
          !
          ! DHCPv6 relay - forward client Solicits to DHCP-Router-10
           ipv6 dhcp relay destination 2001:db8:1::2
          !
          ! DHCPv4 helper - forward client Discovers to DHCP-Router-10
           ip helper-address 10.10.10.2
           no shutdown
          !
          ! ============================================================
          ! Uplink to DHCP-Router-20  (VLAN20 segment transit)
          ! GW side: 10.10.20.1 / 2001:db8:2::1
          ! ============================================================
          interface Ethernet0/2
           description TO-DHCP20-VLAN20
           ip address 10.10.20.1 255.255.255.0
           ipv6 address 2001:db8:2::1/64
           ipv6 enable
          !
          ! RA flags for VLAN20 - STATELESS DHCPv6
          ! M=0: do NOT use DHCPv6 for addresses (use SLAAC)
          ! O=1: use DHCPv6 for options only (DNS etc.)
          ! prefix has autoconfig (A=1): SLAAC address from this prefix
           ipv6 nd other-config-flag
           ipv6 nd ra-interval 10
           ipv6 nd ra-lifetime 1800
           ipv6 nd prefix 2001:db8:2::/64
          !
          ! DHCPv6 relay for info-requests only
           ipv6 dhcp relay destination 2001:db8:2::2
          !
           ip helper-address 10.10.20.2
           no shutdown
          !
          ! ============================================================
          ! Uplink to DHCP-Router-30  (VLAN30 segment transit)
          ! GW side: 10.10.30.1 / 2001:db8:3::1
          ! ============================================================
          interface Ethernet0/3
           description TO-DHCP30-VLAN30
           ip address 10.10.30.1 255.255.255.0
           ipv6 address 2001:db8:3::1/64
           ipv6 enable
          !
          ! RA flags for VLAN30 - PURE SLAAC
          ! M=0, O=0: no DHCPv6 at all
          ! prefix has autoconfig (A=1): SLAAC only
           ipv6 nd ra-interval 10
           ipv6 nd ra-lifetime 1800
           ipv6 nd prefix 2001:db8:3::/64
          !
          ! No DHCPv6 relay on VLAN30 - pure SLAAC
           ip helper-address 10.10.30.2
           no shutdown
          !
          ! ============================================================
          ! Static routes back to client subnets via DHCP routers
          ! ============================================================
          ip route 0.0.0.0 0.0.0.0 Null0
          ipv6 route ::/0 Null0
          !
          username admin privilege 15 secret Cisc0Lab!
          ip ssh version 2
          crypto key generate rsa modulus 2048
          line vty 0 4
           login local
           transport input ssh
          !
          end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: iol-xe-17-18-02
    label: GW-Router
    node_definition: iol-xe
    parameters: {}
    priority: null
