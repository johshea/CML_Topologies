          !
          ! ============================================================
          ! VLAN20  -  STATELESS DHCPv6 (ra-stateless / O=1 only)
          ! This router provides:
          !   - DHCPv4 pool for 10.10.20.0/24
          !   - DHCPv6 information-only (DNS, domain — NO address pool)
          !   - Clients form IPv6 addresses via SLAAC (EUI-64)
          ! ============================================================
          no ip domain-lookup
          ipv6 unicast-routing
          ipv6 cef
          ip cef
          !
          ! === Uplink to GW-Router ===
          interface Ethernet0/0
           description TO-GW-ROUTER
           ip address 10.10.20.2 255.255.255.0
           ipv6 address 2001:db8:2::2/64
           ipv6 enable
           no shutdown
          !
          ! === Downlink to Client-Stateless ===
          interface Ethernet0/1
           description TO-CLIENT-STATELESS
           ip address 10.10.20.3 255.255.255.0
           ipv6 address 2001:db8:2::3/64
           ipv6 enable
           no shutdown
          !
          ! ============================================================
          ! DHCPv4 Server  -  VLAN20
          ! ============================================================
          ip dhcp excluded-address 10.10.20.1 10.10.20.99
          ip dhcp excluded-address 10.10.20.151 10.10.20.254
          !
          ip dhcp pool VLAN20-IPv4
           network 10.10.20.0 255.255.255.0
           default-router 10.10.20.1
           dns-server 10.10.20.2
           domain-name stateless.lab
           lease 0 12
          !
          ! ============================================================
          ! DHCPv6 Server  -  STATELESS (information-only, no address pool)
          ! When GW sends RA with O=1 and M=0, clients send
          ! DHCPv6 Information-Request (not Solicit).
          ! We respond with DNS and domain — no IA_NA address assigned.
          ! Note: no 'address prefix' line = stateless (info-only) pool
          ! ============================================================
          ipv6 dhcp pool VLAN20-IPv6-STATELESS
           dns-server 2001:db8:2::2
           domain-name stateless.lab
          !
          interface Ethernet0/0
           ipv6 dhcp server VLAN20-IPv6-STATELESS
          !
          interface Ethernet0/1
           ipv6 dhcp server VLAN20-IPv6-STATELESS
          !
          ! ============================================================
          ! DNS
          ! ============================================================
          ip dns server
          ip host router.stateless.lab 10.10.20.1
          ip host gw.stateless.lab 10.10.20.1
          ip host dns.stateless.lab 10.10.20.2
          !
          ip route 0.0.0.0 0.0.0.0 10.10.20.1
          ipv6 route ::/0 2001:db8:2::1
          !
          username admin privilege 15 secret Cisc0Lab!
          ip ssh version 2
          crypto key generate rsa modulus 2048
          line vty 0 4
           login local
           transport input ssh
          !
          end
