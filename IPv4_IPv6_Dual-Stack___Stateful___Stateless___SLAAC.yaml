lab:
  description: Three-segment dual-stack lab using IOL-XE routers throughout. GW-Router
    provides inter-VLAN routing and RAs. Three DHCP-Router nodes act as DHCPv4+DHCPv6
    servers for each segment. VLAN10=Stateful DHCPv6, VLAN20=Stateless DHCPv6, VLAN30=Pure
    SLAAC. One Alpine client per segment.
  notes: |-
    === Addressing Plan ===

    VLAN10 - STATEFUL DHCPv6 (M=1, O=1)
      IPv4: 10.10.10.0/24   GW: 10.10.10.1  DHCP-Router: 10.10.10.2
      IPv6: 2001:db8:1::/64 GW: 2001:db8:1::1  DHCP-Router: 2001:db8:1::2
      DHCPv4 pool: 10.10.10.100-150
      DHCPv6 pool: 2001:db8:1::100-150 (IA_NA)
      Client gets: DHCPv4 addr + DHCPv6 IA_NA addr (no SLAAC)

    VLAN20 - STATELESS DHCPv6 (M=0, O=1)
      IPv4: 10.10.20.0/24   GW: 10.10.20.1  DHCP-Router: 10.10.20.2
      IPv6: 2001:db8:2::/64 GW: 2001:db8:2::1  DHCP-Router: 2001:db8:2::2
