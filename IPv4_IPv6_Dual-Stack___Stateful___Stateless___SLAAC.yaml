  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname DHCP-Router-10
          !
          ! ============================================================
          ! VLAN10  -  STATEFUL DHCPv6
          ! This router provides:
          !   - DHCPv4 pool for 10.10.10.0/24
          !   - DHCPv6 pool (IA_NA) for 2001:db8:1::/64
          !   - DNS service (IOS dns server)
          ! ============================================================
          no ip domain-lookup
          ipv6 unicast-routing
          ipv6 cef
          ip cef
          !
          ! === Uplink to GW-Router ===
          interface Ethernet0/0
           description TO-GW-ROUTER
           ip address 10.10.10.2 255.255.255.0
           ipv6 address 2001:db8:1::2/64
           ipv6 enable
           no shutdown
          !
          ! === Downlink to Client-Stateful ===
          interface Ethernet0/1
           description TO-CLIENT-STATEFUL
           ip address 10.10.10.3 255.255.255.0
           ipv6 address 2001:db8:1::3/64
           ipv6 enable
           no shutdown
          !
          ! ============================================================
          ! DHCPv4 Server  -  VLAN10
          ! ============================================================
          ip dhcp excluded-address 10.10.10.1 10.10.10.99
          ip dhcp excluded-address 10.10.10.151 10.10.10.254
          !
          ip dhcp pool VLAN10-IPv4
           network 10.10.10.0 255.255.255.0
           default-router 10.10.10.1
           dns-server 10.10.10.2
           domain-name stateful.lab
           lease 0 12
          !
          ! ============================================================
          ! DHCPv6 Server  -  STATEFUL (IA_NA pool)
          ! Clients that receive M=1 in RA will send DHCPv6 Solicit
          ! and receive a full IA_NA address lease from this pool.
          ! ============================================================
          ipv6 dhcp pool VLAN10-IPv6-STATEFUL
           address prefix 2001:db8:1::/64
           dns-server 2001:db8:1::2
           domain-name stateful.lab
          !
          ! Bind the DHCPv6 pool to the uplink interface
          ! (clients reach us via relay from GW-Router)
          interface Ethernet0/0
           ipv6 dhcp server VLAN10-IPv6-STATEFUL
          !
          ! Also serve directly-connected clients on Eth0/1
          interface Ethernet0/1
           ipv6 dhcp server VLAN10-IPv6-STATEFUL
          !
          ! ============================================================
          ! DNS  -  IOS internal DNS server
          ! ============================================================
          ip dns server
          ip host router.stateful.lab 10.10.10.1
          ip host gw.stateful.lab 10.10.10.1
          ip host dns.stateful.lab 10.10.10.2
          !
          ! Default route back to GW
          ip route 0.0.0.0 0.0.0.0 10.10.10.1
          ipv6 route ::/0 2001:db8:1::1
          !
          username admin privilege 15 secret Cisc0Lab!
          ip ssh version 2
          crypto key generate rsa modulus 2048
          line vty 0 4
           login local
           transport input ssh
          !
          end
    cpu_limit: null
    cpus: null
