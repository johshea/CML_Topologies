          #cloud-boothook
          config
            system
             ztp-status            success
             pseudo-confirm-commit 300
             personality           vedge
             device-model          vedge-C8000V
             chassis-number        C8K-D4CE7174-5261-7E6F-91EA-4926BCF4C2DD
             system-ip             10.0.0.2
             overlay-id            1
             site-id               2
             ipv6-strict-control   false
             port-offset           0
             control-session-pps   300
             admin-tech-on-failure
             sp-organization-name  cml-sdwan-lab-tool
             organization-name     cml-sdwan-lab-tool
             port-hop
             track-transport
             track-default-gateway
             console-baud-rate     9600
             config-template-name  edge_basic
             no on-demand enable
             on-demand idle-timeout 10
             vbond validator.sdwan.local port 12346
            !
            bfd default-dscp 48
            bfd app-route multiplier 6
            bfd app-route poll-interval 600000
            sslproxy
             no enable
             rsa-key-modulus      2048
             certificate-lifetime 730
             eckey-type           P256
             ca-tp-label          PROXY-SIGNING-CA
             settings expired-certificate  drop
             settings untrusted-certificate drop
             settings unknown-status       drop
             settings certificate-revocation-check none
             settings unsupported-protocol-versions drop
             settings unsupported-cipher-suites drop
             settings failure-mode         close
             settings minimum-tls-ver      TLSv1
             dual-side optimization enable
            !
            sdwan
             interface GigabitEthernet1
              tunnel-interface
               encapsulation ipsec weight 1
               no border
               color biz-internet restrict
               no last-resort-circuit
               no low-bandwidth-link
               no vbond-as-stun-server
               vmanage-connection-preference 5
               port-hop
               no full-port-hop
               carrier                       default
               nat-refresh-interval          5
               hello-interval                1000
               hello-tolerance               12
               no allow-service all
               no allow-service bgp
               allow-service dhcp
               allow-service dns
               allow-service icmp
               no allow-service sshd
               no allow-service netconf
               no allow-service ntp
               no allow-service ospf
               no allow-service stun
               allow-service https
               no allow-service snmp
               no allow-service bfd
              exit
             exit
             interface GigabitEthernet2
              tunnel-interface
               encapsulation ipsec weight 1
               no border
               color mpls restrict
               no last-resort-circuit
               no low-bandwidth-link
               no vbond-as-stun-server
               vmanage-connection-preference 5
               port-hop
               no full-port-hop
               carrier                       default
               nat-refresh-interval          5
               hello-interval                1000
               hello-tolerance               12
               no allow-service all
               no allow-service bgp
               allow-service dhcp
               allow-service dns
               allow-service icmp
               no allow-service sshd
               no allow-service netconf
               no allow-service ntp
               no allow-service ospf
               no allow-service stun
               allow-service https
               no allow-service snmp
               no allow-service bfd
              exit
             exit
             appqoe
              no tcpopt enable
              no dreopt enable
              no httpopt enable
             !
             ip load-sharing algorithm ip-and-ports
             ipv6 load-sharing algorithm ip-and-ports
             omp
              no shutdown
              send-path-limit  4
              ecmp-limit       4
              graceful-restart
              no as-dot-notation
              timers
               holdtime               60
               advertisement-interval 1
               graceful-restart-timer 43200
               eor-timer              300
              exit
              address-family ipv4 vrf 1
              !
              address-family ipv4
               advertise connected
               advertise static
               distance 251
              !
              address-family ipv6
               distance 251
              !
             !
            !
            service tcp-keepalives-in
            service tcp-keepalives-out
            no service tcp-small-servers
            no service udp-small-servers
            platform console serial
            hostname Edge02
            username admin privilege 15 secret 9 $9$wkdA0U4WR2IFUT$jyjJ4ZLWINoP.y0atboVo3njOuZYHNaIzugIBABUMcs
            vrf definition 1
             description VPN 1
             address-family ipv4
              exit-address-family
             !
             address-family ipv6
              exit-address-family
             !
            !
            global-address-family ipv4
             exit-global-af
            !
            ip arp proxy disable
            ip cef load-sharing algorithm include-ports source destination
            ip dhcp excluded-address vrf 1 192.168.2.1
            ip dhcp pool vrf-1-GigabitEthernet3
             network 192.168.2.0 255.255.255.0
             vrf 1
             lease 1 0 0
             default-router 192.168.2.1
             dns-server 172.16.1.254 1.1.1.1
            exit
            ip dhcp use hardware-address client-id
            no ip dhcp use class
            ip dhcp use vrf remote
            ip forward-protocol nd
            no ip forward-protocol udp
            no ip ftp passive
            ip name-server 172.16.1.254 172.16.2.254
            ip name-server no-vrf 172.16.1.254 172.16.2.254
            ip name-server vrf 1 172.16.1.254 1.1.1.1
            ip name-server vrf 1 server-ip-list 1.1.1.1 172.16.1.254
            ip route 0.0.0.0 0.0.0.0 172.16.1.254
            ip route 0.0.0.0 0.0.0.0 172.16.2.254
            ip bootp server
            no ip source-route
            no ip ssh bulk-mode
            ip tcp RST-count 10 RST-window 5000
            no ip http server
            no ip http secure-server
            no ip http ctc authentication
            ip nat inside source list nat-dia-vpn-hop-access-list interface GigabitEthernet1 overload
            ip nat translation tcp-timeout 3600
            ip nat translation udp-timeout 60
            ip nat route vrf 1 0.0.0.0 0.0.0.0 global
            ip nat settings central-policy
            ipv6 cef load-sharing algorithm include-ports source destination
            interface GigabitEthernet1
             description   INET
             no shutdown
             arp timeout 1200
             ip address 172.16.1.2 255.255.255.0
             no ip redirects
             ip mtu    1500
             ip nat outside
             load-interval 30
             mtu           1500
             negotiation auto
            exit
            interface GigabitEthernet2
             description   MPLS
             no shutdown
             arp timeout 1200
             ip address 172.16.2.2 255.255.255.0
             no ip redirects
             ip mtu    1500
             load-interval 30
             mtu           1500
             negotiation auto
            exit
            interface GigabitEthernet3
             description   LAN
             no shutdown
             arp timeout 1200
             vrf forwarding 1
             ip address 192.168.2.1 255.255.255.0
             no ip redirects
             ip mtu    1500
             load-interval 30
             mtu           1500
             negotiation auto
            exit
            interface Tunnel1
             no shutdown
             ip unnumbered GigabitEthernet1
             no ip redirects
             ipv6 unnumbered GigabitEthernet1
             no ipv6 redirects
             tunnel source GigabitEthernet1
             tunnel mode sdwan
            exit
            interface Tunnel2
             no shutdown
             ip unnumbered GigabitEthernet2
             no ip redirects
             ipv6 unnumbered GigabitEthernet2
             no ipv6 redirects
             tunnel source GigabitEthernet2
             tunnel mode sdwan
            exit
            clock timezone UTC 0 0
            logging persistent size 104857600 filesize 10485760
            logging buffered 512000
            logging console
            no logging queue-limit
            aaa authentication login default local
            aaa authorization exec default local
            aaa server radius dynamic-author
            !
            radius-server cache expiry 24
            no crypto ikev2 diagnose error
            no crypto isakmp diagnose error
            no network-clock revertive
            snmp-server ifindex persist
            fhrp version vrrp v2
            line con 0
             speed    9600
             stopbits 1
            !
            line vty 0 4
             transport input ssh
            !
            line vty 5 80
             transport input ssh
            !
            no process cpu extended history
            no acc-gyro enable
            no ignition sense
            no ignition enable
            lldp run
            nat64 translation timeout tcp 3600
            nat64 translation timeout udp 300
           !
          !

